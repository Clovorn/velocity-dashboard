
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f2f2f0;--bg1:#fff;--bg2:#ebebea;--bg3:#e0e0de;
  --t1:#1a1a18;--t2:#585853;--t3:#96968f;
  --bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.15);
  --blue:#2570c8;--bluebg:#e6f0fb;--bluet:#0c3d7a;
  --green:#17875a;--greenbg:#e2f4ec;--greent:#0a4f32;
  --amber:#b85a18;--amberbg:#fdf0e4;--ambert:#6b3309;
  --redbg:#fce8e8;--redt:#7a1a1a;
  --purplebg:#f0ecfb;--purplet:#4a2d8a;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--bg1:#242422;--bg2:#2c2c2a;--bg3:#343432;
  --t1:#eeeeea;--t2:#9a9a94;--t3:#5e5e58;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --bluebg:#0b2240;--bluet:#7ab0f0;
  --greenbg:#08200f;--greent:#68c898;
  --amberbg:#281500;--ambert:#e09050;
  --redbg:#280808;--redt:#f07070;
  --purplebg:#1a1030;--purplet:#b090f0;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}
.wrap{max-width:1340px;margin:0 auto;padding:1.25rem 1rem}
button,select,input[type=text]{font-family:inherit;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r);padding:5px 10px;background:var(--bg1);color:var(--t1);cursor:pointer}
button:hover,select:hover{background:var(--bg2)}
input[type=text]{cursor:text}
input[type=text]:focus{outline:none;border-color:var(--blue)}
input[type=file]{display:none}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:8px;padding:.75rem 1rem;background:#1a1a18;border:0.5px solid rgba(255,255,255,0.08);border-radius:var(--rl)}
.brand{font-size:17px;font-weight:700;color:var(--t1)}
.brand-sub{font-size:11px;color:var(--t3);margin-left:6px}
.tbr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{font-size:12px;padding:5px 12px;white-space:nowrap;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg1);color:var(--t1);cursor:pointer}
.btn:hover{background:var(--bg2)}
.btn-g{border-color:#4ade99;color:#4ade99;font-weight:600}.btn-g:hover{background:rgba(74,222,153,.15)}
.btn-b{border-color:#7ab0f0;color:#7ab0f0;font-weight:600}.btn-b:hover{background:rgba(122,176,240,.15)}

/* ── Distributor tabs ── */
.dist-tabs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:.875rem;padding:0}
.dist-tab{font-size:12px;padding:6px 14px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s}
.dist-tab:hover{background:var(--bg2)}
.dist-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.dist-tab.all-tab{background:var(--bg2);border-color:var(--bdr2)}
.dist-tab.all-tab.active{background:var(--t1);color:var(--bg1);border-color:var(--t1)}

/* ── Month bar ── */
.mbar{display:flex;align-items:center;gap:4px;padding:7px 10px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);margin-bottom:.875rem;flex-wrap:wrap}
.mbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.mob{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;white-space:nowrap}
.mob.loaded{background:var(--greenbg);color:var(--greent);border-color:rgba(23,135,90,.3)}
.mob.active{background:var(--bluebg);color:var(--bluet);border-color:rgba(37,112,200,.4);font-weight:700}
.mob.ytd{color:var(--bluet);border-color:var(--blue);font-weight:700}.mob.ytd.active{background:var(--bluebg)}
.mob:disabled{opacity:.35;cursor:default}
.mob:hover:not(.active):not(:disabled){background:var(--bg3)}
.mbar-info{font-size:11px;color:var(--t3);margin-left:auto;white-space:nowrap}

/* ── Filter bar ── */
.fbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 10px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);margin-bottom:.875rem}
.fbar label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.fbar select{font-size:12px;padding:3px 8px}
.fsep{width:1px;height:14px;background:var(--bdr2);margin:0 2px}

/* ── Metrics ── */
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.875rem}
.met{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.met-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:3px}
.met-v{font-size:20px;font-weight:700;color:var(--t1);line-height:1.1}
.met-s{font-size:11px;margin-top:2px;color:var(--t3)}
.up{color:var(--greent)}.dn{color:var(--redt)}

/* ── Cards ── */
.card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:.875rem 1rem;margin-bottom:.875rem}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:6px}
.ctitle{font-size:13px;font-weight:700;color:var(--t1)}
.csub{font-size:11px;color:var(--t3);margin-top:1px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:.875rem}
@media(max-width:720px){.two{grid-template-columns:1fr}}

/* ── Chart tabs ── */
.tabs{display:flex;gap:3px}
.tab{font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;border:0.5px solid transparent;color:var(--t2);background:none}
.tab.on{background:var(--bluebg);color:var(--bluet);border-color:rgba(37,112,200,.3)}
.tab:hover:not(.on){background:var(--bg2)}
.ylbl{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);cursor:pointer}
.chart-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:700;color:var(--t2);padding:5px 7px;border-bottom:0.5px solid var(--bdr);text-align:left;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--blue)}
th.sort-asc::after{content:' ↑';color:var(--blue)}
th.sort-desc::after{content:' ↓';color:var(--blue)}
th.sort-asc,th.sort-desc{color:var(--blue)}
td{padding:8px 7px;border-bottom:0.5px solid var(--bdr);color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.dr:hover td{background:var(--bg2);cursor:pointer}
.arr{color:var(--t3);font-size:14px;text-align:right}
.bw{display:flex;align-items:center;gap:5px}
.bb{flex:1;height:4px;background:var(--bg3);border-radius:2px;min-width:30px}
.bf{height:4px;border-radius:2px}

/* ── Pills & badges ── */
.pill{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.pu{background:var(--greenbg);color:var(--greent)}.pd{background:var(--redbg);color:var(--redt)}.pn{background:var(--bg2);color:var(--t2)}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap}
.wh-b{background:var(--bluebg);color:var(--bluet)}
.vn-b{background:var(--purplebg);color:var(--purplet)}
.dt-b{background:var(--amberbg);color:var(--ambert)}

/* ── Charts ── */
.cwl{position:relative;width:100%;height:215px}
.cw{position:relative;width:100%;height:175px}
.leg{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--t2);margin-bottom:5px}
.leg span{display:flex;align-items:center;gap:3px}
.lsq{width:9px;height:9px;border-radius:2px;display:inline-block}

/* ── Breadcrumb ── */
.bc{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:12px;color:var(--t2);margin-bottom:.75rem;padding:7px 10px;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--r)}
.bc-home{color:var(--t3);font-size:15px;cursor:pointer;line-height:1}.bc-home:hover{color:var(--t1)}
.bc-sep{color:var(--t3)}
.bc-link{color:var(--blue);cursor:pointer;font-weight:600}.bc-link:hover{text-decoration:underline}
.bc-cur{color:var(--t1);font-weight:600}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:.875rem}
.bbtn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);border:0.5px solid var(--bdr2);border-radius:var(--r);padding:5px 12px;cursor:pointer;background:var(--bg1);font-weight:600}
.bbtn:hover{background:var(--bluebg);border-color:var(--blue)}
.dh-name{font-size:15px;font-weight:700;color:var(--t1)}
.dh-sub{font-size:11px;color:var(--t2);margin-top:2px}

/* ── Modal ── */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:28px 16px;overflow-y:auto}
.modal{background:var(--bg1);border:0.5px solid var(--bdr2);border-radius:var(--rl);width:min(720px,100%)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:0.5px solid var(--bdr)}
.mtitle{font-size:14px;font-weight:700;color:var(--t1)}
.mclose{font-size:22px;cursor:pointer;color:var(--t2);background:none;border:none;padding:0 4px;line-height:1}
.mbody{padding:1.25rem;max-height:80vh;overflow-y:auto}
.slbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .5rem}
.dz{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:2rem;text-align:center;transition:background .15s}
.dz.over{background:var(--bg2);border-color:var(--blue)}
.dz strong{font-size:14px;font-weight:600;color:var(--t1)}
.dz p{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.7}
.dist-input-row{display:flex;gap:8px;align-items:center;margin-top:.875rem;flex-wrap:wrap}
.dist-input-row label{font-size:12px;color:var(--t2);white-space:nowrap;font-weight:600}
.dist-input-row input{flex:1;min-width:180px;padding:7px 10px;font-size:13px}
.choose-btn{display:inline-block;padding:8px 20px;background:var(--blue);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;margin-top:.875rem}
.choose-btn:hover{opacity:.9}

/* ── Column mapper ── */
.mapper{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);padding:1rem;margin-top:.875rem}
.mapper-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:.5rem}
.mapper-sub{font-size:11px;color:var(--t2);margin-bottom:.875rem}
.mapper-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.mapper-grid{grid-template-columns:1fr}}
.mapper-row{display:flex;flex-direction:column;gap:3px}
.mapper-row label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.03em}
.mapper-row select{font-size:12px;padding:4px 8px}
.mapper-row.required label::after{content:' *';color:var(--redt)}
.mapper-actions{display:flex;gap:8px;margin-top:.875rem}

/* ── Month grid ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:.875rem}
.mcell{border:0.5px solid var(--bdr);border-radius:var(--r);padding:8px 10px}
.mcell .mm{font-weight:700;font-size:12px;color:var(--t1)}
.mcell .ms{font-size:10px;color:var(--t3);margin-top:2px}
.mcell.loaded{background:var(--greenbg);border-color:rgba(23,135,90,.25)}
.mcell.loaded .mm{color:var(--greent)}
.mcell.missing{background:var(--bg2);border-style:dashed}
.mcell.missing .mm{color:var(--t3)}
.mcdel{float:right;font-size:13px;cursor:pointer;color:var(--redt);opacity:.5;border:none;background:none;padding:0;line-height:1}
.mcdel:hover{opacity:1}
.lrow{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:12px}
.lrow:last-child{border-bottom:none}

/* ── Overlay ── */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:300}
.obox{background:var(--bg1);border-radius:var(--rl);padding:1.5rem 2rem;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:var(--t1);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.spin{width:20px;height:20px;border:2px solid var(--bdr2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1}.toast.err{background:var(--redt)}

/* ── Empty ── */
.empty{text-align:center;padding:5rem 1rem}
.empty h2{font-size:20px;font-weight:700;margin-bottom:10px}
.empty p{font-size:13px;color:var(--t2);max-width:460px;margin:0 auto 6px;line-height:1.7}
code{font-family:monospace;background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:12px}

/* ── All distributors combined summary cards ── */
.dist-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.875rem;margin-bottom:.875rem}
.dist-card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:border-color .15s}
.dist-card:hover{border-color:var(--blue)}
.dist-card-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.dist-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dist-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dist-stat-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.dist-stat-v{font-size:15px;font-weight:700;color:var(--t1)}
.dist-stat-s{font-size:10px;color:var(--t3);margin-top:1px}

/* ── Pricing / GP ── */
.gp-pos{color:var(--greent);font-weight:600}
.gp-neg{color:var(--redt);font-weight:600}
.gp-neu{color:var(--t2)}
.price-tab{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 13px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;font-weight:500}
.price-tab.active{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:700}
.price-tab:hover:not(.active){background:var(--amberbg);border-color:var(--amber);color:var(--ambert)}
.price-upload-zone{border:2px dashed var(--bdr2);border-radius:var(--r);padding:1.5rem;text-align:center;margin-bottom:.875rem}
.price-upload-zone p{font-size:12px;color:var(--t2);margin-top:5px}
.gp-metric{background:var(--greenbg);border-radius:var(--r);padding:10px 12px}
.gp-metric .met-l{color:var(--greent)}
.gp-metric .met-v{color:var(--greent)}
.naming-tip{background:var(--amberbg);border:0.5px solid rgba(184,90,24,.2);border-radius:var(--r);padding:.75rem 1rem;font-size:12px;color:var(--ambert);margin-bottom:.875rem;line-height:1.7}
.naming-tip strong{font-weight:700}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<div class="toast" id="toast"></div>

<script>
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SK='velocity_multi_v1';
const SK_PRICE='velocity_pricing_v1';
const DIST_COLORS=['#2570c8','#17875a','#b85a18','#7c3aed','#0891b2','#be185d','#15803d','#b45309'];

// ── Pricing store: { [distributor]: { [itemno]: {sellPrice, feeFlat, feePct, description} } }
let PRICES={};

function loadPrices(){try{const d=localStorage.getItem(SK_PRICE);if(d)PRICES=JSON.parse(d);}catch{}}
function savePrices(){try{localStorage.setItem(SK_PRICE,JSON.stringify(PRICES));}catch{}}

// Get Ronnoco cost for a row: sell price + distributor fee
function getRonnCost(dist,itemno,distRevPerCase){
  const p=PRICES[dist]?.[String(itemno)];
  if(!p||!p.sellPrice)return null;
  let cost=+p.sellPrice||0;
  if(p.feeFlat)cost+=+p.feeFlat;
  if(p.feePct)cost+=distRevPerCase*(+p.feePct/100);
  return cost;
}

// GP per case given dist revenue per case
function getGP(dist,itemno,distRevPerCase){
  const cost=getRonnCost(dist,itemno,distRevPerCase);
  if(cost===null||distRevPerCase===0)return null;
  return distRevPerCase-cost;
}

function gpClass(v){if(v===null)return'gp-neu';return v>0?'gp-pos':'gp-neg';}
function fmtGP(v){if(v===null)return'<span class="gp-neu">—</span>';return`<span class="${gpClass(v)}">${v>=0?'+':''}$${Math.abs(v).toFixed(2)}</span>`;}
function fmtGPPct(v){if(v===null)return'<span class="gp-neu">—</span>';return`<span class="${gpClass(v)}">${v>=0?'+':''}${v.toFixed(1)}%</span>`;}

// Compute GP totals for a set of rows
function computeGP(rows,dist){
  let totalGPDollar=0,gpCases=0;
  rows.forEach(r=>{
    const rev=+r.sales||0;const qty=+r.qty||0;
    if(qty===0)return;
    const revPerCase=rev/qty;
    const gp=getGP(dist,r.itemno,revPerCase);
    if(gp!==null){totalGPDollar+=gp*qty;gpCases+=qty;}
  });
  const hasPricing=gpCases>0;
  const totalRev=sa(rows.map(r=>+r.sales||0));
  const gpPct=totalRev>0&&hasPricing?totalGPDollar/totalRev*100:null;
  return{dollar:hasPricing?totalGPDollar:null,pct:gpPct,hasPricing};
}

// ── Storage ───────────────────────────────────────────────────────
let DB={uploads:[],log:[]};


// ── Pricing file ingestion ────────────────────────────────────────
function ingestPricingFile(file){
  if(!file)return;
  const dist=S.activeDist;
  if(!dist){toast('Select a distributor first','err');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if(!raw||raw.length<2){toast('Empty pricing file','err');return;}
      // Find header row
      let hdrIdx=0;
      for(let i=0;i<Math.min(4,raw.length);i++){
        if(raw[i].filter(c=>c!==null&&c!==undefined&&c!=='').length>=2){hdrIdx=i;break;}
      }
      const hdr=raw[hdrIdx].map(h=>String(h||'').trim().toLowerCase());
      // Map columns
      const guess=(...terms)=>{const i=hdr.findIndex(h=>terms.some(t=>h.includes(t)));return i>=0?i:-1;};
      const iItem=guess('item','sku','#','code','no');
      const iSell=guess('sell','price','ronnoco','cost');
      const iFeeFlat=guess('fee $','flat fee','fee flat','dist fee $','distributor fee $','fee amount');
      const iFeePct=guess('fee %','fee pct','fee percent','dist fee %','distributor fee %');
      const iDesc=guess('desc','product','name');
      if(iItem<0||iSell<0){toast('Need at least Item # and Sell Price columns','err');return;}
      if(!PRICES[dist])PRICES[dist]={};
      let count=0;
      raw.slice(hdrIdx+1).forEach(row=>{
        const itemno=String(row[iItem]||'').trim();
        if(!itemno)return;
        const sell=+row[iSell]||0;
        PRICES[dist][itemno]={
          sellPrice:sell,
          feeFlat:iFeeFlat>=0?+(row[iFeeFlat]||0):0,
          feePct:iFeePct>=0?+(row[iFeePct]||0):0,
          description:iDesc>=0?String(row[iDesc]||'').trim():'',
        };
        count++;
      });
      savePrices();
      render();
      toast(`${count} prices loaded for ${dist}`);
    }catch(e){toast('Error reading pricing file: '+e.message,'err');}
  };
  reader.readAsBinaryString(file);
}

function exportPricing(){
  const dist=S.activeDist;if(!dist)return;
  const distPrices=PRICES[dist]||{};
  const rows=getRows(S.yr,dist);
  const itemMap={};
  rows.forEach(r=>{if(!itemMap[r.itemno])itemMap[r.itemno]={itemno:r.itemno,desc:(r.description||'').trim(),cases:0,rev:0};itemMap[r.itemno].cases+=+r.qty||0;itemMap[r.itemno].rev+=+r.sales||0;});
  const wb=XLSX.utils.book_new();
  const data=[['Item #','Description','Cases ('+S.yr+')','Dist Rev/Case','Ronnoco Sell Price','Dist Fee $','Dist Fee %','Total Cost/Case','GP $/Case','GP %','Total GP $']];
  Object.values(itemMap).sort((a,b)=>b.cases-a.cases).forEach(item=>{
    const p=distPrices[item.itemno]||{};
    const revPerCase=item.cases>0?item.rev/item.cases:0;
    const sell=+p.sellPrice||0;const feeFlat=+p.feeFlat||0;const feePct=+p.feePct||0;
    const totalCost=sell+feeFlat+(revPerCase*feePct/100);
    const gpPC=sell>0?revPerCase-totalCost:null;
    const gpPctV=revPerCase>0&&gpPC!==null?gpPC/revPerCase*100:null;
    const totalGP=gpPC!==null?gpPC*item.cases:null;
    data.push([item.itemno,item.desc,item.cases,+revPerCase.toFixed(2),sell||'',feeFlat||'',feePct||'',sell>0?+totalCost.toFixed(2):'',gpPC!==null?+gpPC.toFixed(2):'',gpPctV!==null?+gpPctV.toFixed(1):'',totalGP!==null?+totalGP.toFixed(2):'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),'Pricing & GP');
  XLSX.writeFile(wb,`pricing_${dist}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Pricing exported');
}

async function boot(){
  loadPrices();
  // Try new multi key first
  try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);DB.uploads=p.uploads||[];DB.log=p.log||[];}}catch{}
  // Migrate from any old keys if we have nothing yet
  if(!DB.uploads.length){
    try{
      for(const ok of ['velocity_hackney_v1','velocity_v5','velocity_v4','velocity_multi_v1']){
        const d=localStorage.getItem(ok);
        if(d){const p=JSON.parse(d);if(p.uploads&&p.uploads.length){
          DB.uploads=p.uploads.map(u=>({...u,distributor:u.distributor||'Hackney'}));
          DB.log=p.log||[];
          localStorage.setItem(SK,JSON.stringify(DB));
          break;
        }}
      }
    }catch{}
  }
  render();
  // Sync from server in background — never blocks UI
  try{
    const r=await fetch('/api/data',{signal:AbortSignal.timeout(5000)});
    if(r.ok){const d=await r.json();if(d.uploads&&d.uploads.length>0){
      DB.uploads=d.uploads.map(u=>({...u,distributor:u.distributor||'Hackney'}));
      DB.log=d.log||[];
      try{localStorage.setItem(SK,JSON.stringify(DB));}catch{}
      render();
    }}
  }catch{}
}

// ── Data helpers ──────────────────────────────────────────────────
function getDistributors(){return[...new Set(DB.uploads.map(u=>u.distributor).filter(Boolean))].sort();}
function getYears(){return[...new Set(DB.uploads.map(u=>u.year))].sort();}
function getLM(yr,dist){
  const map={};
  DB.uploads.filter(u=>u.year==yr&&(!dist||u.distributor===dist)).forEach(u=>{
    if(!map[u.monthKey])map[u.monthKey]={k:u.monthKey,mo:u.month,yr:u.year,cases:0,dists:[]};
    map[u.monthKey].cases+=u.rows.reduce((s,r)=>s+(+r.qty||0),0);
    map[u.monthKey].dists.push(u.distributor);
  });
  return Object.values(map).sort((a,b)=>a.k.localeCompare(b.k));
}
function getRows(yr,dist){
  let ups=DB.uploads.filter(u=>u.year==yr);
  if(dist)ups=ups.filter(u=>u.distributor===dist);
  if(S.vm)ups=ups.filter(u=>u.monthKey===S.vm);
  const rows=[];
  ups.forEach(u=>u.rows.forEach(r=>rows.push({...r,_mo:u.month,_yr:u.year,_dist:u.distributor})));
  return rows;
}
function filt(rows){
  return rows.filter(r=>{
    if(S.fWH!=='All'&&String(r.whs||'')!==S.fWH)return false;
    if(S.fVendor!=='All'&&String(r.vendor||'')!==S.fVendor)return false;
    return true;
  });
}
function distColor(name){const dists=getDistributors();const i=dists.indexOf(name);return DIST_COLORS[i%DIST_COLORS.length];}

// ── Math ──────────────────────────────────────────────────────────
const sa=a=>a.reduce((s,v)=>s+(+v||0),0);
function fmtM(n){if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(2);}
function fmtC(n){return Math.round(n).toLocaleString();}
function yp(c,p){return p>0?Math.round((c-p)/p*100):null;}
function pill(v){if(v===null)return'<span class="pill pn">—</span>';return'<span class="pill '+(v>0?'pu':v<0?'pd':'pn')+'">'+(v>0?'+':'')+v+'%</span>';}
function moV(rows,mo,field){return sa(rows.filter(r=>r._mo===mo).map(r=>+r[field]||0));}
function rollup(rows,kfn){
  const m={};
  rows.forEach(r=>{
    const k=kfn(r);if(!k)return;
    if(!m[k])m[k]={key:k,cases:0,rev:0,cs:new Set(),ss:new Set(),mo:new Array(12).fill(0)};
    m[k].cases+=+r.qty||0;m[k].rev+=+r.sales||0;
    m[k].cs.add(r.custName);m[k].ss.add(r.itemno);
    m[k].mo[r._mo]+=+r.qty||0;
  });
  return Object.values(m).map(x=>({...x,custs:x.cs.size,skus:x.ss.size})).sort((a,b)=>b.cases-a.cases);
}
function sortRows(rows,col,dir){
  return[...rows].sort((a,b)=>{
    let av=a[col]??0,bv=b[col]??0;
    if(typeof av==='string'&&typeof bv==='string')return dir*av.localeCompare(bv);
    return dir*(+av-+bv);
  });
}

function render(){
  const ys=getYears();
  if(!S.yr||!ys.includes(+S.yr))S.yr=ys.length?+ys[ys.length-1]:null;
  if(S.vm){const lm=getLM(S.yr||0,S.activeDist);if(!lm.find(m=>m.k===S.vm))S.vm=null;}
  const root=document.getElementById('root');
  if(!S.yr){root.innerHTML=renderEmpty();if(S.modal)root.insertAdjacentHTML('beforeend',renderModal());bindAll();return;}
  let html='';
  if(S.view==='combined')html=renderCombined();
  else if(S.view==='pricing')html=renderPricing();
  else if(S.view==='overview')html=renderOverview();
  else if(S.view==='wh')html=renderWH();
  else if(S.view==='cust')html=renderCust();
  else if(S.view==='cat')html=renderCat();
  else if(S.view==='skuAccts')html=renderSKUAccts();
  else html=renderOverview();
  root.innerHTML=html;
  if(S.modal)root.insertAdjacentHTML('beforeend',renderModal());
  bindAll();renderCharts();
}

    ${(S.sort.col?sortRows(distData,S.sort.col,S.sort.dir):distData).map(d=>{

  ${custs.map(c=>{
    const pc=pCusts.find(x=>x.key===c.key);const pct=Math.round(c.cases/mx*100);

// ── Customer drill ────────────────────────────────────────────────
function renderCust(){
  const ys=getYears();const prYr=ys[ys.indexOf(+S.yr)-1];
  const dist=S.activeDist;
  const name=decodeURIComponent(S.cust);
  const all=getRows(S.yr,dist);
  const cur=filt(all).filter(r=>r.custName===name);
  const pri=prYr?filt(getRows(prYr,dist)).filter(r=>r.custName===name):[];
  if(!cur.length)return renderOverview();
  const ref=cur[0];
  const totC=sa(cur.map(r=>+r.qty||0)),totR=sa(cur.map(r=>+r.sales||0));
  const pTotC=sa(pri.map(r=>+r.qty||0)),pTotR=sa(pri.map(r=>+r.sales||0));
  let skus=rollup(cur,r=>r.itemno+'§'+(r.description||'').trim());
  const pSkus=rollup(pri,r=>r.itemno+'§'+(r.description||'').trim());
  if(S.sort.col)skus=sortRows(skus.map(sk=>{const[ino,desc]=sk.key.split('§');const sr=cur.find(r=>r.itemno==ino)||{};return{...sk,ino,desc,pack:sr.pack||'',size:(sr.size||'').trim(),costPerCase:sk.cases>0?sk.rev/sk.cases:0};}),S.sort.col,S.sort.dir);
  const mx=skus.length?Math.max(...skus.map(s=>s.cases)):1;
  const lm=getLM(S.yr,dist).length||1;
  const moc=MO.map((_,m)=>moV(cur,m,'qty'));
  const peak=moc.indexOf(Math.max(...moc));
  return topBarH()+distTabsH()+mbH()+fbH(all)+
  bcH([{label:`WH ${ref.whs||''}`,nav:'wh'},{label:name}])+
  `<div class="back-row"><button class="bbtn" data-go-wh="${ref.whs||''}">← Warehouse ${ref.whs||''}</button><div><div class="dh-name">${name}</div><div class="dh-sub">${ref.groupName||''} · ${ref.city||''}, ${ref.st||''} · WH ${ref.whs||''} · ${dist}</div></div></div>
  <div class="mets">
    <div class="met"><div class="met-l">Total Cases</div><div class="met-v">${fmtC(totC)}</div><div class="met-s ${yp(totC,pTotC)>=0?'up':'dn'}">${prYr&&pTotC?(yp(totC,pTotC)>=0?'▲':'▼')+' '+Math.abs(yp(totC,pTotC))+'% YOY':''}</div></div>
    <div class="met"><div class="met-l">Revenue</div><div class="met-v">${fmtM(totR)}</div><div class="met-s ${yp(totR,pTotR)>=0?'up':'dn'}">${prYr&&pTotR?(yp(totR,pTotR)>=0?'▲':'▼')+' '+Math.abs(yp(totR,pTotR))+'% YOY':''}</div></div>
    <div class="met"><div class="met-l">Avg/Mo</div><div class="met-v">${Math.round(totC/lm)}</div></div>
    <div class="met"><div class="met-l">SKUs Active</div><div class="met-v">${skus.length}</div></div>
    <div class="met"><div class="met-l">Peak Month</div><div class="met-v">${moc.some(v=>v>0)?MO[peak]:'—'}</div></div>
  </div>
  <div class="card"><div class="chdr"><span class="ctitle">Monthly Velocity — ${name}</span>${ccH()}</div><div class="leg" id="leg-cust"></div><div class="cwl"><canvas id="ch-cust"></canvas></div></div>
  <div class="card"><div class="chdr"><div><div class="ctitle">Products Purchased</div><div class="csub">Click column to sort · Click row to see all accounts →</div></div></div>
  <table><thead><tr>${th('Item #','ino')}${th('Description','desc')}${th('Pack','pack')}${th('Size','size')}${th('Cases','cases')}${th('Dist Rev/Case','costPerCase')}${th('GP $/Case','gpPerCase')}${th('GP %','gpPct')}${th('Total GP','totalGP')}${th('Revenue','rev')}<th>YOY</th><th></th></tr></thead><tbody>
  ${skus.map(sk=>{
    const[ino,desc]=(sk.key||'').split('§');const ps=pSkus.find(x=>x.key===sk.key);
    const pct=Math.round(sk.cases/mx*100);const sr=cur.find(r=>r.itemno==(sk.ino||ino))||{};
    const skuIno=sk.ino||ino,skuDesc=sk.desc||desc||'';
    const revPerCase=sk.cases>0?sk.rev/sk.cases:0;
    const gpPC=getGP(dist,skuIno,revPerCase);
    const gpPct2=revPerCase>0&&gpPC!==null?gpPC/revPerCase*100:null;
    const totalGP2=gpPC!==null?gpPC*sk.cases:null;
    return`<tr class="dr" data-go-sku="${skuIno}">
    <td style="font-size:11px;color:var(--t2)">${skuIno}</td>
    <td style="font-weight:600">${skuDesc}</td>
    <td style="font-size:12px">${sk.pack||sr.pack||''}</td>
    <td style="font-size:12px">${sk.size||(sr.size||'').trim()}</td>
    <td><div class="bw"><div class="bb"><div class="bf" style="width:${pct}%;background:${distColor(dist)}"></div></div>${fmtC(sk.cases)}</div></td>
    <td style="font-size:12px;text-align:right">$${revPerCase.toFixed(2)}</td>
    <td style="font-size:12px;text-align:right">${fmtGP(gpPC)}</td>
    <td style="font-size:12px;text-align:right">${fmtGPPct(gpPct2)}</td>
    <td style="font-size:12px;text-align:right;font-weight:600">${totalGP2!==null?`<span class="${gpClass(totalGP2)}">${totalGP2>=0?'+':''}$${Math.abs(totalGP2).toFixed(0)}</span>`:'<span class="gp-neu">—</span>'}</td>
    <td style="font-size:12px">${fmtM(sk.rev)}</td>
    <td>${pill(ps?yp(sk.cases,ps.cases):null)}</td><td class="arr">›</td></tr>`;
  }).join('')}</tbody></table></div>
  <div class="card"><div class="chdr"><span class="ctitle">Month-by-Month Detail</span></div>
  <table><thead><tr><th>Month</th><th>Cases</th>${prYr?`<th>Prior Yr</th><th>YOY</th>`:''}<th>Rev/Case</th><th>Revenue</th><th>GP $/Case</th><th>GP %</th><th>Total GP</th><th>vs Avg</th></tr></thead><tbody>
  ${MO.map((m,i)=>{
    const cs=moV(cur,i,'qty'),rv=moV(cur,i,'sales'),pcs=moV(pri,i,'qty');
    const revPerCase=cs>0?rv/cs:0;
    const moRows=cur.filter(r=>r._mo===i);
    const moGP=computeGP(moRows,dist);
    const gpPC=moGP.hasPricing&&cs>0?moGP.dollar/cs:null;
    const gpPct2=moGP.pct;
    const avg=Math.round(totC/lm),diff=cs-avg;
    if(!cs&&!rv)return`<tr><td style="color:var(--t3)">${m}</td><td colspan="8" style="color:var(--t3);font-size:11px">— not yet loaded</td></tr>`;

function renderCat(){

  ${skus.map(sk=>{

    const pct=Math.round(sk.cases/mx*100);const sr=cur.find(r=>r.itemno==(sk.ino||ino))||{};

}

// ── Charts ────────────────────────────────────────────────────────
function buildChart(cid,lid,curRows,priRows,prLbl,color){
  const el=document.getElementById(cid);if(!el)return;
  color=color||'#2570c8';
  const mC=MO.map((_,m)=>moV(curRows,m,'qty'));
  const mR=MO.map((_,m)=>moV(curRows,m,'sales'));
  const pC=priRows?MO.map((_,m)=>moV(priRows,m,'qty')):null;
  const pR=priRows?MO.map((_,m)=>moV(priRows,m,'sales')):null;
  const ds=[];
  if(S.tab==='cases'||S.tab==='both'){
    ds.push({label:`Cases ${S.yr}`,data:mC,backgroundColor:color+'b8',borderColor:color,borderWidth:1,type:'bar',yAxisID:'y'});
    if(pC&&S.yoy)ds.push({label:`Cases ${prLbl}`,data:pC,borderColor:'#b85a18',borderWidth:2,borderDash:[4,3],pointRadius:3,type:'line',tension:0.4,fill:false,yAxisID:'y'});
  }
  if(S.tab==='rev'||S.tab==='both'){
    const ya=S.tab==='both'?'y2':'y';
    ds.push({label:`Revenue ${S.yr}`,data:mR,borderColor:'#17875a',backgroundColor:'rgba(23,135,90,0.10)',borderWidth:2,fill:true,tension:0.4,pointRadius:3,type:'line',yAxisID:ya});
    if(pR&&S.yoy)ds.push({label:`Revenue ${prLbl}`,data:pR,borderColor:'#6b3309',borderWidth:1.5,borderDash:[4,3],pointRadius:2,type:'line',tension:0.4,fill:false,yAxisID:ya});
  }
  const leg=document.getElementById(lid);
  if(leg)leg.innerHTML=ds.map(d=>`<span><span class="lsq" style="background:${d.backgroundColor&&!d.backgroundColor.startsWith('rgba(23')?d.backgroundColor:d.borderColor}"></span>${d.label}</span>`).join('');
  const sc={x:{grid:{display:false},ticks:{font:{size:11},autoSkip:false}},y:{beginAtZero:true,ticks:{font:{size:11},callback:v=>S.tab==='rev'?fmtM(v):v}}};
  if(S.tab==='both')sc.y2={beginAtZero:true,position:'right',grid:{display:false},ticks:{font:{size:11},callback:v=>fmtM(v)}};
  dc(cid);CH[cid]=new Chart(el.getContext('2d'),{data:{labels:MO,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:sc}});
}

function renderCharts(){
  const ys=getYears();const prYr=ys[ys.indexOf(+S.yr)-1];
  const dist=S.activeDist;
  const prLbl=prYr||'Prior';
  const dc2=dist?distColor(dist):'#2570c8';
  if(S.view==='combined'){
    dc('ch-combined');
    const el=document.getElementById('ch-combined');if(!el)return;
    const dists=getDistributors();
    const datasets=[];
    dists.forEach((d,i)=>{
      const rows=filt(getRows(S.yr,d));
      const color=DIST_COLORS[i%DIST_COLORS.length];
      const mC=MO.map((_,m)=>moV(rows,m,'qty'));
      datasets.push({label:d,data:mC,backgroundColor:color+'b8',borderColor:color,borderWidth:1,type:'bar'});
    });
    const leg=document.getElementById('leg-combined');
    if(leg)leg.innerHTML=datasets.map(d=>`<span><span class="lsq" style="background:${d.borderColor}"></span>${d.label}</span>`).join('');
    CH['ch-combined']=new Chart(el.getContext('2d'),{data:{labels:MO,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},autoSkip:false}},y:{beginAtZero:true,stacked:true,ticks:{font:{size:11}}}}}});
  }
  if(S.view==='overview'){
    const cur=filt(getRows(S.yr,dist));const pri=prYr?filt(getRows(prYr,dist)):null;
    buildChart('ch-ov','leg-ov',cur,pri,prLbl,dc2);
  }
  if(S.view==='wh'){
    const f=r=>String(r.whs||'')===S.wh;
    const cur=filt(getRows(S.yr,dist)).filter(f);const pri=prYr?filt(getRows(prYr,dist)).filter(f):null;
    buildChart('ch-wh','leg-wh',cur,pri,prLbl,dc2);
  }
  if(S.view==='cust'&&S.cust){
    const name=decodeURIComponent(S.cust);const f=r=>r.custName===name;
    const cur=filt(getRows(S.yr,dist)).filter(f);const pri=prYr?filt(getRows(prYr,dist)).filter(f):null;
    buildChart('ch-cust','leg-cust',cur,pri,prLbl,dc2);
  }
  if(S.view==='cat'&&S.cat){
    const f=r=>String(r.vendor||'')===S.cat;
    const cur=filt(getRows(S.yr,dist)).filter(f);const pri=prYr?filt(getRows(prYr,dist)).filter(f):null;
    buildChart('ch-cat','leg-cat',cur,pri,prLbl,dc2);
  }
  if(S.view==='skuAccts'&&S.sku){
    const f=r=>String(r.itemno)===String(S.sku);
    const cur=filt(getRows(S.yr,dist)).filter(f);const pri=prYr?filt(getRows(prYr,dist)).filter(f):null;
    buildChart('ch-sku','leg-sku',cur,pri,prLbl,dc2);
  }
}

// ── Column mapper ─────────────────────────────────────────────────
function renderMapper(){
  const {headers}=S.pendingFile;
  const opts='<option value="">— skip —</option>'+headers.map((h,i)=>`<option value="${i}">${h}</option>`).join('');
  // Auto-detect common column names
  function guess(...terms){const i=headers.findIndex(h=>terms.some(t=>h.toLowerCase().includes(t)));return i>=0?i:'';}
  const auto={
    custName:guess('customer name','account name','customer','acct name'),
    whs:guess('whs','warehouse','location','branch','dc '),
    groupName:guess('group name','group','chain'),
    custNo:guess('customer #','acct #','account #','cust no'),
    city:guess('city','market'),
    st:guess(' st','state'),
    vendor:guess('vendor','brand','supplier','mfr'),
    itemno:guess('itemno','item no','item #','sku','upc','item code','product code'),
    description:guess('description','desc','product name','item name','brand name'),
    qty:guess('qty','quantity','cases','units','sold','movement'),
    sales:guess('sales $','sales','revenue','amount','net sales','ext'),
    pack:guess('pack','pack size'),
    size:guess('size','unit size'),
  };
  const fields=[
    {key:'custName',label:'Customer Name',required:true},
    {key:'whs',label:'Warehouse',required:false},
    {key:'groupName',label:'Group/Chain Name',required:false},
    {key:'custNo',label:'Customer Number',required:false},
    {key:'city',label:'City',required:false},
    {key:'st',label:'State',required:false},
    {key:'vendor',label:'Vendor/Brand',required:false},
    {key:'itemno',label:'Item/SKU Number',required:true},
    {key:'description',label:'Product Description',required:true},
    {key:'qty',label:'Cases / Qty',required:true},
    {key:'sales',label:'Revenue / Sales $',required:false},
    {key:'pack',label:'Pack',required:false},
    {key:'size',label:'Size',required:false},
  ];
  return`<div class="mapper">
    <div class="mapper-title">Step 3 — Map columns</div>
    <div class="mapper-sub">We detected ${headers.length} columns. Match each field to the right column. Required fields are marked *</div>
    <div class="mapper-grid">
      ${fields.map(f=>`<div class="mapper-row${f.required?' required':''}">
        <label>${f.label}</label>
        <select id="map-${f.key}">
          ${opts.replace(`value="${auto[f.key]}"`,`value="${auto[f.key]}" selected`)}
        </select>
      </div>`).join('')}
    </div>
    <div class="mapper-actions">
      <button class="btn btn-g" id="mapper-import">Import File</button>
      <button class="btn" id="mapper-cancel">Cancel</button>
    </div>
  </div>`;
}

    <p style="margin-top:6px;font-size:12px;color:var(--t3)">Supports any .xlsx, .xls, or .csv format — columns are mapped on upload</p>
    <button class="btn btn-g" style="margin-top:1.5rem;padding:9px 22px;font-size:14px" id="open-modal2">Open Upload Manager</button>
  </div>`;
}

// ── File handling ─────────────────────────────────────────────────
function detectMonthFromFilename(fname){
  let mo=null,yr=null;
  let m=fname.match(/^(\d{2})-(\d{4})/);if(m){mo=parseInt(m[1])-1;yr=parseInt(m[2]);}
  if(mo===null){m=fname.match(/^(\d{4})-(\d{2})/);if(m){yr=parseInt(m[1]);mo=parseInt(m[2])-1;}}
  if(mo===null){m=fname.match(/[_\-\s](\d{2})[_\-\s](\d{4})/);if(m){mo=parseInt(m[1])-1;yr=parseInt(m[2]);}}
  if(mo===null){for(let i=0;i<MO.length;i++){if(fname.toLowerCase().includes(MO[i].toLowerCase())){mo=i;break;}}}
  if(yr===null){m=fname.match(/20(\d{2})/);if(m)yr=parseInt('20'+m[1]);}
  return{mo,yr};
}

function handleFile(file){
  const distName=(document.getElementById('dist-name-input')||{}).value?.trim();
  if(!distName){toast('Please enter a distributor name first','err');return;}
  S.pendingDist=distName;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if(!raw||raw.length<2){toast('File appears empty: '+file.name,'err');return;}
      // Find header row (first row with 4+ non-empty cells)
      let hdrIdx=0;
      for(let i=0;i<Math.min(5,raw.length);i++){
        if(raw[i].filter(c=>c!==null&&c!==undefined&&c!=='').length>=4){hdrIdx=i;break;}
      }
      const headers=raw[hdrIdx].map(h=>String(h||'').trim());
      S.pendingFile={rawRows:raw,fname:file.name,hdrIdx,headers};
      S.modal=true;render();
    }catch(e){toast('Error reading '+file.name+': '+e.message,'err');}
  };
  reader.readAsBinaryString(file);
}

function importPendingFile(){
  if(!S.pendingFile)return;
  const {rawRows,fname,hdrIdx}=S.pendingFile;
  const distName=S.pendingDist;
  if(!distName){toast('Please enter a distributor name','err');return;}
  // Read column mapping from selects
  const fields=['custName','whs','groupName','custNo','city','st','vendor','itemno','description','qty','sales','pack','size'];
  const colMap={};
  fields.forEach(f=>{const el=document.getElementById('map-'+f);if(el&&el.value!=='')colMap[f]=parseInt(el.value);});
  if(colMap.custName===undefined||colMap.itemno===undefined||colMap.qty===undefined){
    toast('Customer Name, Item #, and Cases/Qty are required','err');return;
  }
  // Detect month
  const{mo,yr}=detectMonthFromFilename(fname);
  if(mo===null||yr===null){toast('Could not detect month from filename. Rename to: 01-2026_filename.xlsx','err');return;}
  // Parse rows
  const rows=[];
  rawRows.slice(hdrIdx+1).forEach(row=>{
    if(!row[colMap.custName])return;
    const qty=+(row[colMap.qty]||0);if(!qty)return;
    const get=(f)=>colMap[f]!==undefined?String(row[colMap[f]]||'').trim():'';
    rows.push({
      custName:get('custName'),whs:get('whs'),groupName:get('groupName'),
      custNo:get('custNo'),city:get('city'),st:get('st'),
      vendor:get('vendor'),itemno:String(row[colMap.itemno]||'').trim(),
      description:get('description'),qty,
      sales:colMap.sales!==undefined?+(row[colMap.sales]||0):0,
      pack:get('pack'),size:get('size'),
    });
  });
  if(!rows.length){toast('No valid rows found (need Qty > 0)','err');return;}
  const mk=yr+'-'+String(mo+1).padStart(2,'0');
  const rec={id:Date.now()+Math.random(),distributor:distName,monthKey:mk,month:mo,year:yr,uploadedAt:new Date().toLocaleString(),rows};
  const ei=DB.uploads.findIndex(u=>u.monthKey===mk&&u.distributor===distName);
  if(ei>=0)DB.uploads[ei]=rec;else DB.uploads.push(rec);
  const msg=`${distName} · ${MO[mo]} ${yr} — ${fmtC(rows.length)} rows${ei>=0?' (replaced)':''}`;
  DB.log.push({msg,ok:true,at:new Date().toLocaleString()});
  if(DB.log.length>80)DB.log=DB.log.slice(-80);
  saveRec(rec);
  S.pendingFile=null;
  S.activeDist=distName;
  S.view='overview';
  const ys=getYears();S.yr=+ys[ys.length-1];
  S.modal=true;render();toast(msg);
}

// ── Excel Export ──────────────────────────────────────────────────
function doExport(){
  const dist=S.activeDist;
  const cur=filt(getRows(S.yr,dist));
  if(!cur.length){toast('No data to export','err');return;}
  const ys=getYears();const prYr=ys[ys.indexOf(+S.yr)-1];
  const pri=prYr?filt(getRows(prYr,dist)):[];
  const wb=XLSX.utils.book_new();
  const totC=sa(cur.map(r=>+r.qty||0)),totR=sa(cur.map(r=>+r.sales||0));
  const sr=[['Velocity Report'],[`${dist||'All Distributors'} · Year: ${S.yr} · Period: ${S.vm||'YTD'}`],[],
    ['Metric',S.yr,'Prior Year'],
    ['Total Cases',totC,sa(pri.map(r=>+r.qty||0))],
    ['Total Revenue',+totR.toFixed(2),+sa(pri.map(r=>+r.sales||0)).toFixed(2)],
    ['Active Accounts',new Set(cur.map(r=>r.custName)).size],
    ['Active SKUs',new Set(cur.map(r=>r.itemno)).size],[],
    ['Month',...MO,'Total'],
    ['Cases',...MO.map((_,m)=>moV(cur,m,'qty')),totC],
    ['Revenue',...MO.map((_,m)=>+moV(cur,m,'sales').toFixed(2)),+totR.toFixed(2)]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'Summary');
  const whs=rollup(cur,r=>String(r.whs||''));
  const wr=[['Warehouse','Cases',...MO,'Revenue','Accounts']];
  whs.forEach(w=>wr.push([w.key,w.cases,...w.mo,+w.rev.toFixed(2),w.custs]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wr),'Warehouse Summary');
  const skus=rollup(cur,r=>r.itemno+'§'+(r.description||'').trim());
  const pr=[['Item #','Description','Cases',...MO,'Revenue','Selling Accounts']];
  skus.forEach(sk=>{const[i,d]=sk.key.split('§');pr.push([i,d,sk.cases,...sk.mo,+sk.rev.toFixed(2),sk.custs]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pr),'Product Summary');
  const accts=rollup(cur,r=>r.custName);
  const ar=[['Account','Group','City','St','WH','Distributor','Cases','Revenue']];
  accts.forEach(a=>{const ref=cur.find(r=>r.custName===a.key)||{};ar.push([a.key,ref.groupName||'',ref.city||'',ref.st||'',ref.whs||'',ref._dist||'',a.cases,+a.rev.toFixed(2)]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ar),'Account Summary');
  const rr=[['Distributor','WH','Account','Group','City','St','Vendor','Item #','Description','Pack','Size','Month','Cases','Revenue']];
  cur.forEach(r=>rr.push([r._dist||'',r.whs||'',r.custName,r.groupName||'',r.city||'',r.st||'',r.vendor||'',r.itemno,(r.description||'').trim(),r.pack||'',(r.size||'').trim(),MO[r._mo],r.qty,+r.sales.toFixed(2)]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rr),'Raw Data');
  XLSX.writeFile(wb,`velocity_${dist||'all'}_${S.yr}_${S.vm||'YTD'}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel exported — 5 sheets');
}

// ── Events ────────────────────────────────────────────────────────
function bindAll(){
  // Sort headers
  document.querySelectorAll('th[data-sort]').forEach(el=>el.addEventListener('click',()=>{
    const col=el.dataset.sort;
    S.sort.col===col?S.sort.dir*=-1:(S.sort.col=col,S.sort.dir=1);
    render();
  }));

  // Distributor tabs
  document.querySelectorAll('[data-dist-tab]').forEach(el=>el.addEventListener('click',()=>{
    const d=el.dataset.distTab;
    if(d==='combined'){S.activeDist=null;S.view='combined';}
    else setDist(d);
  }));

  // Navigation
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
    const v=el.dataset.nav;
    if(v==='overview'){S.wh=null;S.cust=null;S.cat=null;S.sku=null;}
    go(v);
  }));
  document.querySelectorAll('[data-bc]').forEach(el=>el.addEventListener('click',()=>{
    const i=parseInt(el.dataset.bc);
    if(i===-1){S.wh=null;S.cust=null;S.cat=null;S.sku=null;go('overview');}
    else if(i===0){S.cust=null;S.sku=null;go(S.wh?'wh':S.cat?'cat':'overview');}
    else if(i===1){S.sku=null;go('cust');}
  }));
  document.querySelectorAll('[data-go-wh]').forEach(el=>el.addEventListener('click',()=>go('wh',{wh:el.dataset.goWh})));
  document.querySelectorAll('[data-go-cust]').forEach(el=>el.addEventListener('click',()=>go('cust',{cust:el.dataset.goCust})));
  document.querySelectorAll('[data-go-cat]').forEach(el=>el.addEventListener('click',()=>go('cat',{cat:el.dataset.goCat,sku:null})));
  document.querySelectorAll('[data-go-sku]').forEach(el=>el.addEventListener('click',()=>go('skuAccts',{sku:el.dataset.goSku})));
  document.querySelectorAll('[data-go-sku-cat]').forEach(el=>el.addEventListener('click',()=>go('skuAccts',{sku:el.dataset.goSkuCat})));

  // Month bar
  document.querySelectorAll('[data-mo]').forEach(el=>el.addEventListener('click',()=>{S.vm=el.dataset.mo==='ytd'?null:(el.dataset.mo||null);render();}));

  // Year / filters / chart controls
  const ys=document.getElementById('yr-sel');if(ys)ys.addEventListener('change',()=>{S.yr=+ys.value;S.vm=null;S.wh=null;S.cust=null;S.cat=null;S.sku=null;render();});
  const fw=document.getElementById('f-wh');if(fw)fw.addEventListener('change',()=>{S.fWH=fw.value;render();});
  const fv=document.getElementById('f-vendor');if(fv)fv.addEventListener('change',()=>{S.fVendor=fv.value;render();});
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;render();}));
  const yc=document.getElementById('yoy-chk');if(yc)yc.addEventListener('change',()=>{S.yoy=yc.checked;render();});

  // Export
  const eb=document.getElementById('exp-btn');if(eb)eb.addEventListener('click',doExport);

  // Modal open/close
  ['open-modal','open-modal2'].forEach(id=>{const b=document.getElementById(id);if(b)b.addEventListener('click',()=>{S.modal=true;render();});});
  const mc=document.getElementById('modal-close');if(mc)mc.addEventListener('click',()=>{S.modal=false;S.pendingFile=null;render();});
  const mbg=document.getElementById('modal-bg');if(mbg)mbg.addEventListener('click',e=>{if(e.target===mbg){S.modal=false;S.pendingFile=null;render();}});

  // Distributor name input
  const dni=document.getElementById('dist-name-input');if(dni)dni.addEventListener('input',()=>{S.pendingDist=dni.value.trim();});
  const dqp=document.getElementById('dist-quick-pick');if(dqp)dqp.addEventListener('change',()=>{
    if(dqp.value){S.pendingDist=dqp.value;const dni2=document.getElementById('dist-name-input');if(dni2)dni2.value=dqp.value;}
  });

  // Drop zone & file input
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');[...e.dataTransfer.files].forEach(handleFile);});
  }
  const fu=document.getElementById('fu');if(fu)fu.addEventListener('change',e=>{[...e.target.files].forEach(handleFile);e.target.value='';});

  // Column mapper
  const mi=document.getElementById('mapper-import');if(mi)mi.addEventListener('click',importPendingFile);
  const mcan=document.getElementById('mapper-cancel');if(mcan)mcan.addEventListener('click',()=>{S.pendingFile=null;render();});

  // Delete month
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();
    const k=el.dataset.del,d=el.dataset.delDist;
    if(confirm(`Remove ${k}${d?' ('+d+')':''}? Cannot be undone.`)){
      DB.uploads=DB.uploads.filter(u=>!(u.monthKey===k&&(!d||u.distributor===d)));
      DB.log.push({msg:'Deleted '+k+(d?' ('+d+')':''),ok:true,at:new Date().toLocaleString()});
      await delRec(k);if(S.vm===k)S.vm=null;render();toast('Month removed');
    }
  }));

  // Clear distributor data
  const cdb=document.getElementById('clear-dist-btn');
  if(cdb)cdb.addEventListener('click',async()=>{
    const d=S.pendingDist||S.activeDist;if(!d){toast('Select a distributor first','err');return;}
    if(confirm(`Clear all data for ${d}? Cannot be undone.`)){
      DB.uploads=DB.uploads.filter(u=>u.distributor!==d);
      DB.log.push({msg:'Cleared all data for '+d,ok:true,at:new Date().toLocaleString()});
      try{localStorage.setItem(SK,JSON.stringify(DB));}catch{}
      if(S.activeDist===d){S.activeDist=null;S.view='combined';}
      render();toast(d+' data cleared');
    }
  });

  // Pricing tab navigation
  document.querySelectorAll('[data-view-pricing]').forEach(el=>el.addEventListener('click',()=>{S.view='pricing';S.sort={col:null,dir:1};render();}));

  // Pricing file upload
  const pfu=document.getElementById('price-fu');
  if(pfu)pfu.addEventListener('change',e=>{ingestPricingFile(e.target.files[0]);e.target.value='';});

  // Inline price input editing
  document.querySelectorAll('.price-input').forEach(el=>{
    el.addEventListener('change',()=>{
      const dist=S.activeDist;const item=el.dataset.item;const field=el.dataset.field;
      if(!dist||!item)return;
      if(!PRICES[dist])PRICES[dist]={};
      if(!PRICES[dist][item])PRICES[dist][item]={};
      PRICES[dist][item][field]=el.value?+el.value:0;
      savePrices();render();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur();});
  });

  // Export pricing
  const epb=document.getElementById('export-pricing-btn');
  if(epb)epb.addEventListener('click',exportPricing);

  // Clear pricing for distributor
  const cpb=document.getElementById('clear-pricing-btn');
  if(cpb)cpb.addEventListener('click',()=>{
    const dist=S.activeDist;if(!dist)return;
    if(confirm('Clear all pricing for '+dist+'? Cannot be undone.')){
      delete PRICES[dist];savePrices();render();toast('Pricing cleared for '+dist);
    }
  });

  // Clear all
  const ca=document.getElementById('clear-all-btn');
  if(ca)ca.addEventListener('click',async()=>{
    if(confirm('Clear ALL data from all distributors? Cannot be undone.')){
      await delAll();DB={uploads:[],log:[]};
      S.yr=null;S.vm=null;S.activeDist=null;S.view='combined';S.modal=false;
      render();toast('All data cleared');
    }
  });
}

boot();
</script>
