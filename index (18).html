<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f2f2f0;--bg1:#fff;--bg2:#ebebea;--bg3:#e0e0de;--t1:#1a1a18;--t2:#585853;--t3:#96968f;--bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.15);--blue:#2570c8;--bluebg:#e6f0fb;--bluet:#0c3d7a;--green:#17875a;--greenbg:#e2f4ec;--greent:#0a4f32;--amber:#b85a18;--amberbg:#fdf0e4;--ambert:#6b3309;--redbg:#fce8e8;--redt:#7a1a1a;--purplebg:#f0ecfb;--purplet:#4a2d8a;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg1:#242422;--bg2:#2c2c2a;--bg3:#343432;--t1:#eeeeea;--t2:#9a9a94;--t3:#5e5e58;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);--bluebg:#0b2240;--bluet:#7ab0f0;--greenbg:#08200f;--greent:#68c898;--amberbg:#281500;--ambert:#e09050;--redbg:#280808;--redt:#f07070;--purplebg:#1a1030;--purplet:#b090f0}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5}
.wrap{max-width:1340px;margin:0 auto;padding:1.25rem 1rem}
button,select,input[type=text]{font-family:inherit;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r);padding:5px 10px;background:var(--bg1);color:var(--t1);cursor:pointer}
button:hover,select:hover{background:var(--bg2)}
input[type=text]{cursor:text}input[type=text]:focus{outline:none;border-color:var(--blue)}
input[type=file]{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:8px;padding:.75rem 1rem;background:#1a1a18;border:0.5px solid rgba(255,255,255,.08);border-radius:var(--rl)}
.tbr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{font-size:12px;padding:5px 12px;white-space:nowrap;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg1);color:var(--t1);cursor:pointer}
.btn:hover{background:var(--bg2)}
.btn-g{border-color:#4ade99;color:#4ade99;font-weight:600}.btn-g:hover{background:rgba(74,222,153,.15)}
.btn-b{border-color:#7ab0f0;color:#7ab0f0;font-weight:600}.btn-b:hover{background:rgba(122,176,240,.15)}
.dist-tabs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:.875rem}
.dist-tab{font-size:12px;padding:6px 14px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap}
.dist-tab:hover{background:var(--bg2)}.dist-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.dist-tab.all-tab{background:var(--bg2)}.dist-tab.all-tab.active{background:var(--t1);color:var(--bg1);border-color:var(--t1)}
.price-tab{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 13px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;font-weight:500}
.price-tab.active{background:var(--amber);color:#fff;border-color:var(--amber)}.price-tab:hover:not(.active){background:var(--amberbg);color:var(--ambert)}
.mbar{display:flex;align-items:center;gap:4px;padding:7px 10px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);margin-bottom:.875rem;flex-wrap:wrap}
.mbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.mob{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--bdr2);background:var(--bg1);color:var(--t2);cursor:pointer;white-space:nowrap}
.mob.loaded{background:var(--greenbg);color:var(--greent);border-color:rgba(23,135,90,.3)}
.mob.active{background:var(--bluebg);color:var(--bluet);border-color:rgba(37,112,200,.4);font-weight:700}
.mob.ytd{color:var(--bluet);border-color:var(--blue);font-weight:700}.mob.ytd.active{background:var(--bluebg)}
.mob:disabled{opacity:.35;cursor:default}.mob:hover:not(.active):not(:disabled){background:var(--bg3)}
.fbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 10px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);margin-bottom:.875rem}
.fbar label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.fbar select{font-size:12px;padding:3px 8px}.fsep{width:1px;height:14px;background:var(--bdr2);margin:0 2px}
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.875rem}
.met{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.met-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:3px}
.met-v{font-size:20px;font-weight:700;color:var(--t1);line-height:1.1}
.met-s{font-size:11px;margin-top:2px;color:var(--t3)}
.up{color:var(--greent)}.dn{color:var(--redt)}
.card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:.875rem 1rem;margin-bottom:.875rem}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:6px}
.ctitle{font-size:13px;font-weight:700;color:var(--t1)}.csub{font-size:11px;color:var(--t3);margin-top:1px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:.875rem}
@media(max-width:720px){.two{grid-template-columns:1fr}}
.tabs{display:flex;gap:3px}
.tab{font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;border:0.5px solid transparent;color:var(--t2);background:none}
.tab.on{background:var(--bluebg);color:var(--bluet);border-color:rgba(37,112,200,.3)}.tab:hover:not(.on){background:var(--bg2)}
.ylbl{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:700;color:var(--t2);padding:5px 7px;border-bottom:0.5px solid var(--bdr);text-align:left;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--blue)}.sort-asc::after{content:' ↑';color:var(--blue)}.sort-desc::after{content:' ↓';color:var(--blue)}
.sort-asc,.sort-desc{color:var(--blue)}
td{padding:8px 7px;border-bottom:0.5px solid var(--bdr);color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}tr.dr:hover td{background:var(--bg2);cursor:pointer}
.arr{color:var(--t3);font-size:14px;text-align:right}
.bw{display:flex;align-items:center;gap:5px}.bb{flex:1;height:4px;background:var(--bg3);border-radius:2px;min-width:30px}.bf{height:4px;border-radius:2px}
.pill{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.pu{background:var(--greenbg);color:var(--greent)}.pd{background:var(--redbg);color:var(--redt)}.pn{background:var(--bg2);color:var(--t2)}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap}
.wh-b{background:var(--bluebg);color:var(--bluet)}.vn-b{background:var(--purplebg);color:var(--purplet)}.dt-b{background:var(--amberbg);color:var(--ambert)}
.cwl{position:relative;width:100%;height:215px}.cw{position:relative;width:100%;height:175px}
.leg{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--t2);margin-bottom:5px}
.leg span{display:flex;align-items:center;gap:3px}.lsq{width:9px;height:9px;border-radius:2px;display:inline-block}
.bc{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:12px;color:var(--t2);margin-bottom:.75rem;padding:7px 10px;background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--r)}
.bc-home{color:var(--t3);font-size:15px;cursor:pointer;line-height:1}.bc-home:hover{color:var(--t1)}
.bc-sep{color:var(--t3)}.bc-link{color:var(--blue);cursor:pointer;font-weight:600}.bc-link:hover{text-decoration:underline}.bc-cur{color:var(--t1);font-weight:600}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:.875rem}
.bbtn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);border:0.5px solid var(--bdr2);border-radius:var(--r);padding:5px 12px;cursor:pointer;background:var(--bg1);font-weight:600}
.bbtn:hover{background:var(--bluebg);border-color:var(--blue)}
.dh-name{font-size:15px;font-weight:700;color:var(--t1)}.dh-sub{font-size:11px;color:var(--t2);margin-top:2px}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:28px 16px;overflow-y:auto;pointer-events:auto}
.modal{background:var(--bg1);border:0.5px solid var(--bdr2);border-radius:var(--rl);width:min(720px,100%);overflow:visible;position:relative;z-index:201;pointer-events:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:0.5px solid var(--bdr)}
.mtitle{font-size:14px;font-weight:700;color:var(--t1)}.mclose{font-size:22px;cursor:pointer;color:var(--t2);background:none;border:none;padding:0 4px;line-height:1}
.mbody{padding:1.25rem;max-height:80vh;overflow-y:auto;overflow-x:visible}
.slbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .5rem}
.dz{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:2rem;text-align:center;transition:background .15s;cursor:default}
.dz.over{background:var(--bg2);border-color:var(--blue)}.dz strong{font-size:14px;font-weight:600;color:var(--t1)}.dz p{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.7}
.dist-input-row{display:flex;gap:8px;align-items:center;margin-bottom:.875rem;flex-wrap:wrap}
.dist-input-row label{font-size:12px;color:var(--t2);white-space:nowrap;font-weight:600}
.dist-input-row input{flex:1;min-width:180px;padding:7px 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg1);color:var(--t1)}
.choose-btn{display:inline-block;padding:8px 20px;background:var(--blue);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;margin-top:.875rem}
.choose-btn:hover{opacity:.9}
.mapper{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);padding:1rem;margin-top:.875rem;position:relative;z-index:250}
.mapper-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:.5rem}
.mapper-sub{font-size:11px;color:var(--t2);margin-bottom:.875rem}
.mapper-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.mapper-grid{grid-template-columns:1fr}}
.mapper-row{display:flex;flex-direction:column;gap:3px}
.mapper-row label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.03em}
.mapper-row.required label::after{content:' *';color:var(--redt)}
.mapper-row select{font-size:12px;padding:4px 8px}
.mapper-actions{display:flex;gap:8px;margin-top:.875rem}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:.875rem}
.mcell{border:0.5px solid var(--bdr);border-radius:var(--r);padding:8px 10px}
.mcell .mm{font-weight:700;font-size:12px;color:var(--t1)}.mcell .ms{font-size:10px;color:var(--t3);margin-top:2px}
.mcell.loaded{background:var(--greenbg);border-color:rgba(23,135,90,.25)}.mcell.loaded .mm{color:var(--greent)}
.mcell.missing{background:var(--bg2);border-style:dashed}.mcell.missing .mm{color:var(--t3)}
.mcdel{float:right;font-size:13px;cursor:pointer;color:var(--redt);opacity:.5;border:none;background:none;padding:0;line-height:1}.mcdel:hover{opacity:1}
.lrow{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:12px}.lrow:last-child{border-bottom:none}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:300}
.obox{background:var(--bg1);border-radius:var(--rl);padding:1.5rem 2rem;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:var(--t1);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.spin{width:20px;height:20px;border:2px solid var(--bdr2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1}.toast.err{background:var(--redt)}
.empty{text-align:center;padding:5rem 1rem}
.empty h2{font-size:20px;font-weight:700;margin-bottom:10px}
.empty p{font-size:13px;color:var(--t2);max-width:460px;margin:0 auto 6px;line-height:1.7}
code{font-family:monospace;background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:12px}
.dist-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.875rem;margin-bottom:.875rem}
.dist-card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:border-color .15s}
.dist-card:hover{border-color:var(--blue)}
.dist-card-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.dist-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dist-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dist-stat-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.dist-stat-v{font-size:15px;font-weight:700;color:var(--t1)}.dist-stat-s{font-size:10px;color:var(--t3);margin-top:1px}
.gp-pos{color:var(--greent);font-weight:600}.gp-neg{color:var(--redt);font-weight:600}.gp-neu{color:var(--t2)}
.gp-metric{background:var(--greenbg);border-radius:var(--r);padding:10px 12px}
.gp-metric .met-l{color:var(--greent)}.gp-metric .met-v{color:var(--greent)}
.price-upload-zone{border:2px dashed var(--bdr2);border-radius:var(--r);padding:1.5rem;text-align:center;margin-bottom:.875rem}
.price-upload-zone p{font-size:12px;color:var(--t2);margin-top:5px}
.naming-tip{background:var(--amberbg);border:0.5px solid rgba(184,90,24,.2);border-radius:var(--r);padding:.75rem 1rem;font-size:12px;color:var(--ambert);margin-bottom:.875rem;line-height:1.7}
.naming-tip strong{font-weight:700}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a18;display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.login-card{background:#242422;border:0.5px solid rgba(255,255,255,.1);border-radius:var(--rl);padding:2.5rem;width:min(380px,100%);text-align:center}
.login-logo{margin-bottom:1.75rem}
.login-logo .brand-big{font-size:24px;font-weight:900;letter-spacing:.08em;color:#fff}
.login-logo .brand-small{font-size:10px;font-weight:600;letter-spacing:.22em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:2px}
.login-title{font-size:14px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:1.5rem}
.login-input{width:100%;padding:10px 14px;font-size:14px;background:#1a1a18;border:0.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;text-align:center;letter-spacing:.05em;margin-bottom:.875rem;outline:none;font-family:inherit}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:10px;font-size:14px;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;margin-bottom:.75rem;font-family:inherit}
.login-btn:hover{opacity:.9}.login-err{font-size:12px;color:var(--redt);min-height:18px;margin-bottom:.5rem}
.login-hint{font-size:11px;color:rgba(255,255,255,.3);margin-top:.75rem}
.viewer-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:20px;padding:3px 10px;margin-left:8px}
.signout-btn{font-size:11px;color:rgba(255,255,255,.4);border:0.5px solid rgba(255,255,255,.15);border-radius:var(--r);padding:3px 10px;cursor:pointer;background:none}
.signout-btn:hover{color:#fff;border-color:rgba(255,255,255,.4)}

/* ── Search ── */
.search-wrap{position:relative;flex:1;max-width:320px}
.search-input{width:100%;padding:6px 32px 6px 30px;font-size:13px;background:#2c2c2a;border:0.5px solid rgba(255,255,255,.2);border-radius:var(--r);color:#eee;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--blue);background:#343432}
.search-input::placeholder{color:rgba(255,255,255,.35)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:rgba(255,255,255,.4);pointer-events:none}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:16px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;padding:0;line-height:1;display:none}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg1);border:0.5px solid var(--bdr2);border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:100;max-height:480px;overflow-y:auto;display:none}
.search-results.open{display:block}
.sr-section{padding:6px 0}
.sr-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;padding:6px 12px 3px}
.sr-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;gap:8px}
.sr-item:hover{background:var(--bg2)}
.sr-item-left{display:flex;align-items:center;gap:8px;min-width:0}
.sr-item-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-item-sub{font-size:11px;color:var(--t2);white-space:nowrap}
.sr-item-right{font-size:11px;color:var(--t2);text-align:right;flex-shrink:0}
.sr-item-cases{font-weight:600;color:var(--t1)}
.sr-empty{padding:1.5rem;text-align:center;font-size:13px;color:var(--t2)}
.sr-divider{height:0.5px;background:var(--bdr);margin:2px 0}
.sr-badge{font-size:10px;padding:1px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
// ── Constants ─────────────────────────────────────────────────────
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SK='velocity_multi_v1';
const SK_PRICE='velocity_pricing_v1';

// ── Auth ─────────────────────────────────────────────────────────
let AUTH={token:null,role:null};
function loadAuth(){try{const d=localStorage.getItem(SK_AUTH);if(d){const p=JSON.parse(d);AUTH.token=p.token;AUTH.role=p.role;}}catch{}}
function saveAuth(t,r){AUTH.token=t;AUTH.role=r;try{localStorage.setItem(SK_AUTH,JSON.stringify({token:t,role:r}));}catch{}}
function clearAuth(){AUTH={token:null,role:null};try{localStorage.removeItem(SK_AUTH);}catch{}}
function isAdmin(){return AUTH.role==='admin';}
function authHeaders(){return{'Content-Type':'application/json','X-Auth-Token':AUTH.token||''};}

// ── Pricing ───────────────────────────────────────────────────────
let PRICES={};
function loadPrices(){try{const d=localStorage.getItem(SK_PRICE);if(d)PRICES=JSON.parse(d);}catch{}}
function savePrices(){try{localStorage.setItem(SK_PRICE,JSON.stringify(PRICES));}catch{}}

// ── Data helpers ──────────────────────────────────────────────────
function getDistributors(){return[...new Set(DB.uploads.map(u=>u.distributor).filter(Boolean))].sort();}
function getYears(){return[...new Set(DB.uploads.map(u=>u.year))].sort();}
function getLM(yr,dist){
  const map={};
  DB.uploads.filter(u=>u.year==yr&&(!dist||u.distributor===dist)).forEach(u=>{
    if(!map[u.monthKey])map[u.monthKey]={k:u.monthKey,mo:u.month,yr:u.year,cases:0};
    map[u.monthKey].cases+=(u.rows||[]).reduce((s,r)=>s+(+r.qty||0),0);
  });
  return Object.values(map).sort((a,b)=>a.k.localeCompare(b.k));
}
function getRows(yr,dist){
  let ups=DB.uploads.filter(u=>u.year==yr);
  if(dist)ups=ups.filter(u=>u.distributor===dist);
  if(S.vm)ups=ups.filter(u=>u.monthKey===S.vm);
  const rows=[];
  ups.forEach(u=>(u.rows||[]).forEach(r=>rows.push({...r,_mo:u.month,_yr:u.year,_dist:u.distributor})));
  return rows;
}
function filt(rows){
  return rows.filter(r=>{
    if(S.fWH!=='All'&&String(r.whs||'')!==S.fWH)return false;
    if(S.fVendor!=='All'&&String(r.vendor||'')!==S.fVendor)return false;
    return true;
  });
}
function distColor(name){const i=getDistributors().indexOf(name);return DIST_COLORS[i<0?0:i%DIST_COLORS.length];}

// ── Math & format ─────────────────────────────────────────────────
const sa=a=>a.reduce((s,v)=>s+(+v||0),0);
function fmtM(n){if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(2);}
function fmtC(n){return Math.round(n).toLocaleString();}
function yp(c,p){return p>0?Math.round((c-p)/p*100):null;}
function pill(v){if(v===null)return'<span class="pill pn">—</span>';return`<span class="pill ${v>0?'pu':v<0?'pd':'pn'}">${v>0?'+':''}${v}%</span>`;}
function moV(rows,mo,field){return sa(rows.filter(r=>r._mo===mo).map(r=>+r[field]||0));}
function rollup(rows,kfn){
  const m={};
  rows.forEach(r=>{const k=kfn(r);if(!k)return;
    if(!m[k])m[k]={key:k,cases:0,rev:0,cs:new Set(),ss:new Set(),mo:new Array(12).fill(0)};
    m[k].cases+=+r.qty||0;m[k].rev+=+r.sales||0;m[k].cs.add(r.custName);m[k].ss.add(r.itemno);m[k].mo[r._mo]+=+r.qty||0;
  });
  return Object.values(m).map(x=>({...x,custs:x.cs.size,skus:x.ss.size})).sort((a,b)=>b.cases-a.cases);
}
function sortRows(rows,col,dir){
  return[...rows].sort((a,b)=>{let av=a[col]??0,bv=b[col]??0;
    if(typeof av==='string'&&typeof bv==='string')return dir*av.localeCompare(bv);
    return dir*(+av-+bv);});
}
function th(label,col){
  const active=S.sort.col===col,cls=active?(S.sort.dir===1?'sort-asc':'sort-desc'):'';
  return`<th class="${cls}" data-sort="${col}">${label}</th>`;
}

// ── GP helpers ────────────────────────────────────────────────────
function getRonnCost(dist,itemno,revPerCase){
  const p=PRICES[dist]?.[String(itemno)];if(!p||!p.sellPrice)return null;
  let cost=+p.sellPrice||0;if(p.feeFlat)cost+=+p.feeFlat;if(p.feePct)cost+=revPerCase*(+p.feePct/100);return cost;
}
function getGP(dist,itemno,revPerCase){const cost=getRonnCost(dist,itemno,revPerCase);return(cost===null||revPerCase===0)?null:revPerCase-cost;}
function gpClass(v){return v===null?'gp-neu':v>0?'gp-pos':'gp-neg';}
function fmtGP(v){if(v===null)return'<span class="gp-neu">—</span>';return`<span class="${gpClass(v)}">${v>=0?'+':''}$${Math.abs(v).toFixed(2)}</span>`;}
function fmtGPPct(v){if(v===null)return'<span class="gp-neu">—</span>';return`<span class="${gpClass(v)}">${v>=0?'+':''}${v.toFixed(1)}%</span>`;}
function computeGP(rows,dist){
  let total=0,cases=0;
  rows.forEach(r=>{const q=+r.qty||0,rev=+r.sales||0;if(!q)return;const gp=getGP(dist,r.itemno,rev/q);if(gp!==null){total+=gp*q;cases+=q;}});
  const hasP=cases>0,totRev=sa(rows.map(r=>+r.sales||0));
  return{dollar:hasP?total:null,pct:totRev>0&&hasP?total/totRev*100:null,hasPricing:hasP};
}

const SB_URL='https://cyctfzivrnapbqfbhfsn.supabase.co';
const SB_KEY='sb_publishable_JIcWtyanxx7dN7dAv5g-cQ_IzmGhAMP';

async function sbDirect(path){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}
  });
  if(!res.ok)throw new Error('SB '+res.status);
  return res.json();
}

async function sbAllRows(path){
  const PAGE=1000;
  let all=[],offset=0;
  const sep=path.includes('?')?'&':'?';
  while(true){
    const url=SB_URL+'/rest/v1/'+path+sep+'limit='+PAGE+'&offset='+offset;
    const res=await fetch(url,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}
    });
    if(!res.ok){console.error('sbAllRows error:',res.status);break;}
    const page=await res.json();
    if(!Array.isArray(page)||page.length===0)break;
    all=all.concat(page);
    console.log('Rows loaded:',all.length);
    if(page.length<PAGE)break;
    offset+=PAGE;
  }
  return all;
}

async function loadFromServer(){
  try{
    toast('Loading data...');
    // Auth check + pricing via Netlify function
    const r=await fetch('/api/data',{headers:authHeaders(),signal:AbortSignal.timeout(10000)});
    if(r.status===401){clearAuth();renderLogin('Session expired');return;}
    const d=await r.json();
    if(d.role&&!AUTH.role)AUTH.role=d.role;
    if(d.pricing){Object.assign(PRICES,d.pricing);savePrices();}
    toast('Fetching rows from database...');

    // Fetch uploads metadata directly from Supabase
    const uploads=await sbDirect('uploads?select=*&order=month_key.asc');
    if(!uploads||!uploads.length){toast('No uploads found in database','err');return;}
    toast('Found '+uploads.length+' months — loading rows...');

    // Fetch ALL rows directly from Supabase
    const allRows=await sbAllRows(
      'velocity_rows?select=upload_id,whs,cust_name,group_name,cust_no,city,st,vendor,itemno,description,pack,size,qty,sales&order=id.asc'
    );
    toast('Loaded '+allRows.length+' rows from database');

    // Group by upload_id
    const byUpload={};
    allRows.forEach(r=>{
      if(!byUpload[r.upload_id])byUpload[r.upload_id]=[];
      byUpload[r.upload_id].push({
        whs:r.whs,custName:r.cust_name,groupName:r.group_name,
        custNo:r.cust_no,city:r.city,st:r.st,vendor:r.vendor,
        itemno:r.itemno,description:r.description,pack:r.pack,
        size:r.size,qty:+r.qty,sales:+r.sales
      });
    });

    DB.uploads=uploads.map(u=>({
      id:u.id,distributor:u.distributor||'Hackney',
      monthKey:u.month_key,month:u.month,year:u.year,
      uploadedAt:u.uploaded_at,rows:byUpload[u.id]||[]
    }));
    DB.log=d.log||[];
    
    const totalRows=DB.uploads.reduce((s,u)=>s+u.rows.length,0);
    const totalSales=DB.uploads.reduce((s,u)=>s+u.rows.reduce((ss,r)=>ss+(+r.sales||0),0),0);
    toast('Ready: '+totalRows+' rows, $'+Math.round(totalSales).toLocaleString());
  }catch(e){
    toast('Load error: '+e.message,'err');
    console.error('loadFromServer error:',e);
  }
}


// ── Search ────────────────────────────────────────────────────────
function runSearch(q){
  if(!q||q.length<2)return{customers:[],products:[],warehouses:[],vendors:[]};
  const ql=q.toLowerCase();
  const allRows=[];
  DB.uploads.forEach(u=>(u.rows||[]).forEach(r=>allRows.push({...r,_mo:u.month,_yr:u.year,_dist:u.distributor})));
  const custMap={};
  allRows.forEach(r=>{
    if(!r.custName||!r.custName.toLowerCase().includes(ql))return;
    const k=r.custName+'|'+r._dist;
    if(!custMap[k])custMap[k]={name:r.custName,dist:r._dist,whs:r.whs||'',city:r.city||'',st:r.st||'',cases:0,sales:0};
    custMap[k].cases+=+r.qty||0;custMap[k].sales+=+r.sales||0;
  });
  const customers=Object.values(custMap).sort((a,b)=>b.cases-a.cases).slice(0,8);
  const prodMap={};
  allRows.forEach(r=>{
    const desc=(r.description||'').trim();
    if(!desc||(!desc.toLowerCase().includes(ql)&&!String(r.itemno||'').toLowerCase().includes(ql)))return;
    const k=r.itemno+'|'+r._dist;
    if(!prodMap[k])prodMap[k]={itemno:r.itemno,desc,dist:r._dist,vendor:r.vendor||'',cases:0,sales:0};
    prodMap[k].cases+=+r.qty||0;prodMap[k].sales+=+r.sales||0;
  });
  const products=Object.values(prodMap).sort((a,b)=>b.cases-a.cases).slice(0,8);
  const whMap={};
  allRows.forEach(r=>{
    const whs=String(r.whs||'');
    if(!whs.toLowerCase().includes(ql))return;
    const k=whs+'|'+r._dist;
    if(!whMap[k])whMap[k]={whs,dist:r._dist,cases:0,sales:0};
    whMap[k].cases+=+r.qty||0;whMap[k].sales+=+r.sales||0;
  });
  const warehouses=Object.values(whMap).sort((a,b)=>b.cases-a.cases).slice(0,5);
  const vnMap={};
  allRows.forEach(r=>{
    const v=String(r.vendor||'');
    if(!v.toLowerCase().includes(ql))return;
    const k=v+'|'+r._dist;
    if(!vnMap[k])vnMap[k]={vendor:v,dist:r._dist,cases:0,sales:0,skus:new Set()};
    vnMap[k].cases+=+r.qty||0;vnMap[k].sales+=+r.sales||0;vnMap[k].skus.add(r.itemno);
  });
  const vendors=Object.values(vnMap).map(v=>({...v,skus:v.skus.size})).sort((a,b)=>b.cases-a.cases).slice(0,5);
  return{customers,products,warehouses,vendors};
}

function highlight(text,q){
  if(!q||!text)return text||'';
  const idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx<0)return text;
  return text.slice(0,idx)+'<mark style="background:rgba(37,112,200,.2);color:var(--t1);border-radius:2px">'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}

function renderSearchResults(q){
  if(!q||q.length<2)return'';
  const res=runSearch(q);
  const total=res.customers.length+res.products.length+res.warehouses.length+res.vendors.length;
  if(!total)return'<div class="search-results open"><div class="sr-empty">No results for <strong>'+q+'</strong></div></div>';
  let out='<div class="search-results open">';
  if(res.customers.length){
    out+='<div class="sr-section"><div class="sr-label">&#128100; Customers ('+res.customers.length+')</div>';
    res.customers.forEach(function(c){
      out+='<div class="sr-item" data-sr-cust="'+encodeURIComponent(c.name)+'" data-sr-dist="'+c.dist+'" data-sr-whs="'+c.whs+'">'
        +'<div class="sr-item-left"><span class="sr-badge wh-b">WH '+c.whs+'</span>'
        +'<div><div class="sr-item-name" title="'+c.name+'">'+highlight(c.name,q)+'</div>'
        +'<div class="sr-item-sub">'+c.dist+' &middot; '+c.city+(c.st?' '+c.st:'')+'</div></div></div>'
        +'<div class="sr-item-right"><div class="sr-item-cases">'+fmtC(c.cases)+' cases</div><div>'+fmtM(c.sales)+'</div></div></div>';
    });
    out+='</div>';
  }
  if(res.products.length){
    if(res.customers.length)out+='<div class="sr-divider"></div>';
    out+='<div class="sr-section"><div class="sr-label">&#128230; Products ('+res.products.length+')</div>';
    res.products.forEach(function(p){
      out+='<div class="sr-item" data-sr-sku="'+p.itemno+'" data-sr-dist="'+p.dist+'">'
        +'<div class="sr-item-left"><span class="sr-badge vn-b">'+p.itemno+'</span>'
        +'<div><div class="sr-item-name" title="'+p.desc+'">'+highlight(p.desc,q)+'</div>'
        +'<div class="sr-item-sub">'+p.dist+' &middot; Vendor '+p.vendor+'</div></div></div>'
        +'<div class="sr-item-right"><div class="sr-item-cases">'+fmtC(p.cases)+' cases</div><div>'+fmtM(p.sales)+'</div></div></div>';
    });
    out+='</div>';
  }
  if(res.warehouses.length){
    if(res.customers.length||res.products.length)out+='<div class="sr-divider"></div>';
    out+='<div class="sr-section"><div class="sr-label">&#127981; Warehouses</div>';
    res.warehouses.forEach(function(w){
      out+='<div class="sr-item" data-sr-wh="'+w.whs+'" data-sr-dist="'+w.dist+'">'
        +'<div class="sr-item-left"><span class="sr-badge wh-b">WH '+w.whs+'</span>'
        +'<div class="sr-item-sub">'+w.dist+'</div></div>'
        +'<div class="sr-item-right"><div class="sr-item-cases">'+fmtC(w.cases)+' cases</div><div>'+fmtM(w.sales)+'</div></div></div>';
    });
    out+='</div>';
  }
  if(res.vendors.length){
    if(total>res.vendors.length)out+='<div class="sr-divider"></div>';
    out+='<div class="sr-section"><div class="sr-label">&#127991; Vendors</div>';
    res.vendors.forEach(function(v){
      out+='<div class="sr-item" data-sr-cat="'+v.vendor+'" data-sr-dist="'+v.dist+'">'
        +'<div class="sr-item-left"><span class="sr-badge vn-b">'+v.vendor+'</span>'
        +'<div class="sr-item-sub">'+v.dist+' &middot; '+v.skus+' SKUs</div></div>'
        +'<div class="sr-item-right"><div class="sr-item-cases">'+fmtC(v.cases)+' cases</div><div>'+fmtM(v.sales)+'</div></div></div>';
    });
    out+='</div>';
  }
  out+='</div>';
  return out;
}

function ccH(){return`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">

function metsH(cur,pri,prYr){

}
function bcH(crumbs){
  const parts=crumbs.map((c,i)=>i===crumbs.length-1?`<span class="bc-cur">${c.label}</span>`:`<span class="bc-link" data-bc="${i}">${c.label}</span>`);

}

function renderCust(){

  if(!cur.length)return renderOverview();

    return{...sk,ino,desc,pack:sr.pack||'',size:(sr.size||'').trim(),costPerCase:sk.cases>0?sk.rev/sk.cases:0};}),S.sort.col,S.sort.dir);

// ── File handling ─────────────────────────────────────────────────
function detectMonth(fname){
  let mo=null,yr=null;
  let m=fname.match(/^(\d{2})-(\d{4})/);if(m){mo=parseInt(m[1])-1;yr=parseInt(m[2]);}
  if(mo===null){m=fname.match(/^(\d{4})-(\d{2})/);if(m){yr=parseInt(m[1]);mo=parseInt(m[2])-1;}}
  if(mo===null){m=fname.match(/[_\-\s](\d{2})[_\-\s](\d{4})/);if(m){mo=parseInt(m[1])-1;yr=parseInt(m[2]);}}
  if(mo===null){for(let i=0;i<MO.length;i++){if(fname.toLowerCase().includes(MO[i].toLowerCase())){mo=i;break;}}}
  if(yr===null){m=fname.match(/20(\d{2})/);if(m)yr=parseInt('20'+m[1]);}
  return{mo,yr};
}

function handleFile(file){
  const distInput=document.getElementById('dist-name-input');
  const distName=(distInput?distInput.value:'').trim()||PENDING.dist||'';
  if(!distName){toast('Please enter a distributor name first','err');if(distInput)distInput.focus();return;}
  PENDING.dist=distName;S.pendingDist=distName;
  toast('Reading file...');
  const reader=new FileReader();
  reader.onerror=()=>toast('Error reading file — try again','err');
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if(!raw||raw.length<2){toast('File appears empty: '+file.name,'err');return;}
      // Find header row = row with most non-empty cells (handles title rows)
      let hdrIdx=0,bestCount=0;
      for(let i=0;i<Math.min(6,raw.length);i++){
        const count=(raw[i]||[]).filter(c=>c!==null&&c!==undefined&&c!=='').length;
        if(count>bestCount){bestCount=count;hdrIdx=i;}
      }
      const headers=(raw[hdrIdx]||[]).map(h=>String(h==null||h==undefined?'':h).trim());
      PENDING.file={rawRows:raw,fname:file.name,hdrIdx,headers};
      toast('File loaded — map columns below');
      // Inject mapper directly into existing modal
      const mapZone=document.getElementById('map-zone');
      if(mapZone){
        mapZone.innerHTML=renderMapper();
        // Scroll mapper into view
        mapZone.scrollIntoView({behavior:'smooth',block:'start'});
      } else {
        S.view='upload';S.modal=false;render();
      }
    }catch(e){
      toast('Error reading '+file.name+': '+e.message,'err');
      console.error('handleFile error:',e);
    }
  };
  reader.readAsBinaryString(file);
}

function doImport(){
  // Read dist name fresh from input
  const distInput=document.getElementById('dist-name-input');
  const distName=(distInput?distInput.value:'').trim()||PENDING.dist||'';
  if(!distName){toast('Please enter a distributor name first','err');return;}
  if(!PENDING.file){toast('Please choose a file first','err');return;}
  PENDING.dist=distName;S.pendingDist=distName;
  const {rawRows,fname,hdrIdx}=PENDING.file;
  // Read column map
  const fields=['custName','whs','groupName','custNo','city','st','vendor','itemno','description','qty','sales','pack','size'];
  const colMap={};
  fields.forEach(f=>{const el=document.getElementById('map-'+f);if(el&&el.value!=='')colMap[f]=parseInt(el.value);});
  if(colMap.custName===undefined||colMap.itemno===undefined||colMap.qty===undefined){
    toast('Customer Name, Item #, and Cases/Qty are required','err');return;}
  // Use manually selected month/year, fall back to filename detection
  const umEl=document.getElementById('upload-month');
  const uyEl=document.getElementById('upload-year');
  const manualMo=umEl?parseInt(umEl.value):PENDING.month;
  const manualYr=uyEl?parseInt(uyEl.value):PENDING.year;
  let mo,yr;
  if(manualMo!==null&&manualMo!==undefined&&!isNaN(manualMo)&&manualYr){
    mo=manualMo;yr=manualYr;
  } else {
    const detected=detectMonth(fname);mo=detected.mo;yr=detected.yr;
  }
  if(mo===null||yr===null){toast('Could not detect month — please select month and year above','err');return;}
  // Save selections for next upload
  PENDING.month=mo;PENDING.year=yr;
  const rows=[];
  rawRows.slice(hdrIdx+1).forEach(row=>{
    if(!row[colMap.custName])return;
    const qty=+(row[colMap.qty]||0);if(!qty)return;
    const get=f=>colMap[f]!==undefined?String(row[colMap[f]]||'').trim():'';
    rows.push({custName:get('custName'),whs:get('whs'),groupName:get('groupName'),custNo:get('custNo'),
      city:get('city'),st:get('st'),vendor:get('vendor'),itemno:String(row[colMap.itemno]||'').trim(),
      description:get('description'),qty,sales:colMap.sales!==undefined?+(row[colMap.sales]||0):0,
      pack:get('pack'),size:get('size')});
  });
  if(!rows.length){toast('No valid rows found (need Qty > 0)','err');return;}
  const mk=yr+'-'+String(mo+1).padStart(2,'0');
  const rec={distributor:distName,monthKey:mk,month:mo,year:yr,uploadedAt:new Date().toLocaleString(),rows};
  const ei=DB.uploads.findIndex(u=>u.monthKey===mk&&u.distributor===distName);
  if(ei>=0)DB.uploads[ei]=rec;else DB.uploads.push(rec);
  DB.log.push({msg:`${distName} · ${MO[mo]} ${yr} — ${fmtC(rows.length)} rows${ei>=0?' (replaced)':''}`,ok:true,at:new Date().toLocaleString()});
  S.activeDist=distName;
  S.view='upload';
  const ys=getYears();S.yr=+ys[ys.length-1];
  PENDING.file=null;PENDING.dist='';
  toast('Uploading '+fmtC(rows.length)+' rows...');
  render();
  saveRec(rec).then(()=>{
    toast(distName+' · '+MO[mo]+' '+yr+' — '+fmtC(rows.length)+' rows saved ✓');
    render();
  }).catch(e=>toast('Upload error: '+(e.message||e),'err'));
}

function ingestPricingFile(file){
  if(!file)return;const dist=S.activeDist;if(!dist){toast('Select a distributor first','err');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if(!raw||raw.length<2){toast('Empty pricing file','err');return;}
      let hdrIdx=0;for(let i=0;i<Math.min(4,raw.length);i++){if(raw[i].filter(c=>c!==null&&c!==undefined&&c!=='').length>=2){hdrIdx=i;break;}}
      const hdr=raw[hdrIdx].map(h=>String(h||'').trim().toLowerCase());
      const guess=(...terms)=>{const i=hdr.findIndex(h=>terms.some(t=>h.includes(t)));return i>=0?i:-1;};
      const iItem=guess('item','sku','#','code','no'),iSell=guess('sell','price','ronnoco','cost');
      const iFeeFlat=guess('fee $','flat fee','fee flat','dist fee $'),iFeePct=guess('fee %','fee pct','fee percent','dist fee %');
      if(iItem<0||iSell<0){toast('Need at least Item # and Sell Price columns','err');return;}
      if(!PRICES[dist])PRICES[dist]={};let count=0;
      raw.slice(hdrIdx+1).forEach(row=>{const itemno=String(row[iItem]||'').trim();if(!itemno)return;
        PRICES[dist][itemno]={sellPrice:+(row[iSell]||0),feeFlat:iFeeFlat>=0?+(row[iFeeFlat]||0):0,feePct:iFeePct>=0?+(row[iFeePct]||0):0};count++;});
      savePrices();
      fetch('/api/save-upload',{method:'POST',headers:authHeaders(),body:JSON.stringify({_pricingUpdate:true,distributor:dist,pricing:PRICES[dist]})}).catch(()=>{});
      render();toast(`${count} prices loaded for ${dist}`);
    }catch(e){toast('Error reading pricing file: '+e.message,'err');}
  };
  reader.readAsBinaryString(file);
}

function exportPricing(){
  const dist=S.activeDist;if(!dist)return;
  const distPrices=PRICES[dist]||{},rows=getRows(S.yr,dist),itemMap={};
  rows.forEach(r=>{if(!itemMap[r.itemno])itemMap[r.itemno]={itemno:r.itemno,desc:(r.description||'').trim(),cases:0,rev:0};itemMap[r.itemno].cases+=+r.qty||0;itemMap[r.itemno].rev+=+r.sales||0;});
  const wb=XLSX.utils.book_new();
  const data=[['Item #','Description','Cases','Dist Rev/Case','Ronnoco Sell Price','Dist Fee $','Dist Fee %','Total Cost/Case','GP $/Case','GP %','Total GP $']];
  Object.values(itemMap).sort((a,b)=>b.cases-a.cases).forEach(item=>{
    const p=distPrices[item.itemno]||{},rpc=item.cases>0?item.rev/item.cases:0;
    const sell=+p.sellPrice||0,ff=+p.feeFlat||0,fp=+p.feePct||0,tcc=sell+ff+(rpc*fp/100);
    const gpPC5=sell>0?rpc-tcc:null,gpPct4=rpc>0&&gpPC5!==null?gpPC5/rpc*100:null,totalGP4=gpPC5!==null?gpPC5*item.cases:null;
    data.push([item.itemno,item.desc,item.cases,+rpc.toFixed(2),sell||'',ff||'',fp||'',sell>0?+tcc.toFixed(2):'',gpPC5!==null?+gpPC5.toFixed(2):'',gpPct4!==null?+gpPct4.toFixed(1):'',totalGP4!==null?+totalGP4.toFixed(2):'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),'Pricing & GP');
  XLSX.writeFile(wb,`pricing_${dist}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Pricing exported');
}

    ['Metric',S.yr,'Prior Year'],['Total Cases',totC,sa(pri.map(r=>+r.qty||0))],
    ['Total Revenue',+totR.toFixed(2),+sa(pri.map(r=>+r.sales||0)).toFixed(2)],
    ['Active Accounts',new Set(cur.map(r=>r.custName)).size],['Active SKUs',new Set(cur.map(r=>r.itemno)).size],[],
    ['Month',...MO,'Total'],['Cases',...MO.map((_,m)=>moV(cur,m,'qty')),totC],
    ['Revenue',...MO.map((_,m)=>+moV(cur,m,'sales').toFixed(2)),+totR.toFixed(2)]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'Summary');
  const whs=rollup(cur,r=>String(r.whs||'')),wr=[['Warehouse','Cases',...MO,'Revenue','Accounts']];
  whs.forEach(w=>wr.push([w.key,w.cases,...w.mo,+w.rev.toFixed(2),w.custs]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wr),'Warehouse Summary');
  const skus=rollup(cur,r=>r.itemno+'§'+(r.description||'').trim()),pr=[['Item #','Description','Cases',...MO,'Revenue','Accounts']];
  skus.forEach(sk=>{const[i,d]=sk.key.split('§');pr.push([i,d,sk.cases,...sk.mo,+sk.rev.toFixed(2),sk.custs]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pr),'Product Summary');
  const accts=rollup(cur,r=>r.custName),ar=[['Account','Group','City','St','WH','Dist','Cases','Revenue']];
  accts.forEach(a=>{const ref=cur.find(r=>r.custName===a.key)||{};ar.push([a.key,ref.groupName||'',ref.city||'',ref.st||'',ref.whs||'',ref._dist||'',a.cases,+a.rev.toFixed(2)]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ar),'Account Summary');
  const rr=[['Distributor','WH','Account','Group','City','St','Vendor','Item #','Description','Pack','Size','Month','Cases','Revenue']];
  cur.forEach(r=>rr.push([r._dist||'',r.whs||'',r.custName,r.groupName||'',r.city||'',r.st||'',r.vendor||'',r.itemno,(r.description||'').trim(),r.pack||'',(r.size||'').trim(),MO[r._mo],r.qty,+r.sales.toFixed(2)]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rr),'Raw Data');
  XLSX.writeFile(wb,`velocity_${dist||'all'}_${S.yr}_${S.vm||'YTD'}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel exported — 5 sheets');
}

// ── Events ────────────────────────────────────────────────────────
function bindAll(){
  // Sort
  document.querySelectorAll('th[data-sort]').forEach(el=>el.addEventListener('click',()=>{
    const col=el.dataset.sort;S.sort.col===col?S.sort.dir*=-1:(S.sort.col=col,S.sort.dir=1);render();
  }));
  // Dist tabs
  document.querySelectorAll('[data-dist-tab]').forEach(el=>el.addEventListener('click',()=>{
    const d=el.dataset.distTab;if(d==='combined'){S.activeDist=null;S.view='combined';}else setDist(d);
  }));
  // Pricing tab
  document.querySelectorAll('[data-view-pricing]').forEach(el=>el.addEventListener('click',()=>{S.view='pricing';S.sort={col:null,dir:1};render();}));
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
    const v=el.dataset.nav;if(v==='overview'){S.wh=null;S.cust=null;S.cat=null;S.sku=null;}go(v);
  }));
  document.querySelectorAll('[data-bc]').forEach(el=>el.addEventListener('click',()=>{
    const i=parseInt(el.dataset.bc);
    if(i===-1){S.wh=null;S.cust=null;S.cat=null;S.sku=null;go('overview');}
    else if(i===0){S.cust=null;S.sku=null;go(S.wh?'wh':S.cat?'cat':'overview');}
    else if(i===1){S.sku=null;go('cust');}
  }));
  document.querySelectorAll('[data-go-wh]').forEach(el=>el.addEventListener('click',()=>go('wh',{wh:el.dataset.goWh})));
  document.querySelectorAll('[data-go-cust]').forEach(el=>el.addEventListener('click',()=>go('cust',{cust:el.dataset.goCust})));
  document.querySelectorAll('[data-go-cat]').forEach(el=>el.addEventListener('click',()=>go('cat',{cat:el.dataset.goCat,sku:null})));
  document.querySelectorAll('[data-go-sku]').forEach(el=>el.addEventListener('click',()=>go('skuAccts',{sku:el.dataset.goSku})));
  document.querySelectorAll('[data-go-sku-cat]').forEach(el=>el.addEventListener('click',()=>go('skuAccts',{sku:el.dataset.goSkuCat})));
  // Month bar
  document.querySelectorAll('[data-mo]').forEach(el=>el.addEventListener('click',()=>{S.vm=el.dataset.mo==='ytd'?null:(el.dataset.mo||null);render();}));
  // Filters
  const fw=document.getElementById('f-wh');if(fw)fw.addEventListener('change',()=>{S.fWH=fw.value;render();});
  const fv=document.getElementById('f-vendor');if(fv)fv.addEventListener('change',()=>{S.fVendor=fv.value;render();});
  // Chart controls
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.tab=el.dataset.tab;render();}));
  const yc=document.getElementById('yoy-chk');if(yc)yc.addEventListener('change',()=>{S.yoy=yc.checked;render();});
  // Year
  const ys=document.getElementById('yr-sel');if(ys)ys.addEventListener('change',()=>{S.yr=+ys.value;S.vm=null;S.wh=null;S.cust=null;S.cat=null;S.sku=null;render();});
  // Export
  const eb=document.getElementById('exp-btn');if(eb)eb.addEventListener('click',doExport);
  // Modal
  ['open-modal','open-modal2'].forEach(id=>{const b=document.getElementById(id);if(b)b.addEventListener('click',()=>{S.view='upload';render();});});
  const ub=document.getElementById('upload-back');if(ub)ub.addEventListener('click',()=>{S.view=DB.uploads.length?'overview':'combined';PENDING.file=null;PENDING.dist='';render();});
  // Sign out
  // Search
  const searchInp=document.getElementById('search-input');
  const searchClear=document.getElementById('search-clear');
  if(searchInp){
    searchInp.addEventListener('input',()=>{
      S.searchQ=searchInp.value;
      const panel=document.getElementById('search-results-panel');
      const clearBtn=document.getElementById('search-clear');
      if(clearBtn)clearBtn.style.display=S.searchQ?'block':'none';
      if(panel){
        panel.innerHTML=S.searchQ&&S.searchQ.length>=2?renderSearchResults(S.searchQ):'';
        if(S.searchQ&&S.searchQ.length>=2){
          panel.querySelector('.search-results')&&bindSearchResults();
        }
      }
    });
    searchInp.addEventListener('keydown',e=>{
      if(e.key==='Escape')closeSearch();
    });
  }
  if(searchClear)searchClear.addEventListener('click',closeSearch);
  // Search closes on Escape key only
  // Bind any existing search results
  bindSearchResults();

  const sob=document.getElementById('signout-btn');if(sob)sob.addEventListener('click',()=>{clearAuth();DB={uploads:[],log:[]};try{localStorage.removeItem(SK);}catch{}renderLogin();});
  // Dist name input
  const dni=document.getElementById('dist-name-input');if(dni)dni.addEventListener('input',()=>{PENDING.dist=dni.value.trim();S.pendingDist=dni.value.trim();});
  const dqp=document.getElementById('dist-quick-pick');if(dqp)dqp.addEventListener('change',()=>{if(dqp.value){PENDING.dist=dqp.value;S.pendingDist=dqp.value;const dni2=document.getElementById('dist-name-input');if(dni2)dni2.value=dqp.value;}});
  const umo=document.getElementById('upload-month');if(umo)umo.addEventListener('change',()=>{PENDING.month=parseInt(umo.value);});
  const uyr=document.getElementById('upload-year');if(uyr)uyr.addEventListener('change',()=>{PENDING.year=parseInt(uyr.value);});
  // File upload
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');[...e.dataTransfer.files].forEach(handleFile);});
  }
  // fu-hidden uses inline onchange handler
  // Pricing
  const pfu=document.getElementById('price-fu');if(pfu)pfu.addEventListener('change',e=>{ingestPricingFile(e.target.files[0]);e.target.value='';});
  document.querySelectorAll('.price-input').forEach(el=>{
    el.addEventListener('change',()=>{
      const dist=S.activeDist,item=el.dataset.item,field=el.dataset.field;if(!dist||!item)return;
      if(!PRICES[dist])PRICES[dist]={};if(!PRICES[dist][item])PRICES[dist][item]={};
      PRICES[dist][item][field]=el.value?+el.value:0;savePrices();render();
      fetch('/api/save-upload',{method:'POST',headers:authHeaders(),body:JSON.stringify({_pricingUpdate:true,distributor:dist,pricing:PRICES[dist]})}).catch(()=>{});
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur();});
  });
  const epb=document.getElementById('export-pricing-btn');if(epb)epb.addEventListener('click',exportPricing);
  const cpb=document.getElementById('clear-pricing-btn');if(cpb)cpb.addEventListener('click',()=>{
    const dist=S.activeDist;if(!dist)return;
    if(confirm('Clear all pricing for '+dist+'?')){delete PRICES[dist];savePrices();render();toast('Pricing cleared');}
  });
  // Delete month
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();const k=el.dataset.del;
    if(confirm(`Remove ${k}? Cannot be undone.`)){
      DB.uploads=DB.uploads.filter(u=>u.monthKey!==k);
      await delRec(k,null);if(S.vm===k)S.vm=null;render();toast('Month removed');
    }
  }));
  // Clear all
  const ca=document.getElementById('clear-all-btn');
  if(ca)ca.addEventListener('click',async()=>{
    if(confirm('Clear ALL data? Cannot be undone.')){
      await delAll();DB={uploads:[],log:[]};S.yr=null;S.activeDist=null;S.view='combined';S.modal=false;render();toast('All data cleared');
    }
  });
}

// ── Boot ─────────────────────────────────────────────────────────
async function boot(){
  loadAuth();loadPrices();
  if(!AUTH.token){renderLogin();return;}
  // Show loading spinner — never render stale localStorage data
  document.getElementById('root').innerHTML=
    '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:400">'
    +'<img src="data:image/png;base64,'+LOGO_B64+'" alt="Ronnoco" style="height:48px;width:auto;mix-blend-mode:screen;opacity:.9">'
    +'<div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.6);font-size:14px"><div class="spin"></div>Loading dashboard...</div>'
    +'</div>';
  // Always load fresh from Supabase — it is the source of truth
  await loadFromServer();
  render();
}

boot();
</script>
